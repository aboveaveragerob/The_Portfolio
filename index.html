<style>
:root{
  --bg:#0b0912; --line:#ffffff14; --line-2:#ffffff22;
  --bone-0:#f3eddf; --bone-1:#d2cad9; --bone-2:#938aa3;
  --paper:#f3ecdd; --paper-2:#e9e0cd; --ink:#211b16; --ink-2:#5b5247; --ink-3:#8a7f6c;
  --pink:#ff2d78; --violet:#b25cff;
  --grad:linear-gradient(100deg,#ffb43d,#ff5a3d 26%,#ff2d78 50%,#b25cff 74%,#43b6ff);
  --grad-ink:linear-gradient(100deg,#d9641a,#d62f5a 30%,#b3266e 52%,#7b3fd6 76%,#236fc9);
  --serif:'Fraunces',Georgia,serif; --sans:'Switzer','Helvetica Neue',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);-webkit-text-size-adjust:100%}
body{background:radial-gradient(120% 80% at 50% 0%, #1c1330 0%, var(--bg) 55%);color:var(--bone-1);
  font-family:var(--sans);line-height:1.45;font-feature-settings:"kern" 1;text-rendering:optimizeLegibility;
  -webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
.gradtext{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.stagegl{position:fixed;inset:0;width:100%;height:100%;opacity:.45;pointer-events:none;z-index:0}
.stagegl svg{width:100%;height:100%}

/* top bar (only when open) */
.topbar{position:sticky;top:0;z-index:30;display:none;align-items:center;gap:10px;flex-wrap:nowrap;
  padding:10px clamp(12px,4vw,36px);background:#0b0912d9;backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
body[data-open="1"] .topbar{display:flex}
.tb-brand{display:flex;align-items:center;gap:9px;flex:none}
.tb-brand svg{width:30px;height:30px;display:block}
.tb-brand span{font-family:var(--serif);font-weight:500;font-size:1.05rem}
.tb-nav{display:flex;gap:2px;flex:1 1 auto;min-width:0;overflow-x:auto;flex-wrap:nowrap;scrollbar-width:none;-ms-overflow-style:none}
.tb-nav::-webkit-scrollbar{display:none}
.tb-nav>button{flex:none}
.tb-nav button{appearance:none;background:none;border:none;cursor:pointer;font-family:var(--sans);font-weight:500;
  font-size:.86rem;color:var(--bone-2);padding:9px 11px;min-height:40px;border-radius:6px;position:relative;transition:color .16s,background .16s}
.tb-nav button:hover{color:var(--bone-0);background:#ffffff0a}
.tb-nav button[aria-current="true"]{color:var(--bone-0)}
.tb-nav button[aria-current="true"]::after{content:"";position:absolute;left:11px;right:11px;bottom:3px;height:2px;border-radius:2px;background:var(--grad)}
.tb-close{appearance:none;background:none;border:1px solid var(--line-2);color:var(--bone-1);cursor:pointer;
  font-family:var(--mono);font-size:.72rem;letter-spacing:.06em;padding:8px 12px;border-radius:6px;min-height:40px;flex:none}
.tb-close:hover{color:var(--bone-0);border-color:var(--violet)}

/* stage */
.stage{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:clamp(20px,4vw,48px) 16px 60px;gap:18px}

/* book */
.book-wrap{perspective:2400px}
.book{position:relative;width:min(94vw,540px);height:min(760px,calc(100vh - 140px));height:min(760px,calc(100dvh - 140px));transform-style:preserve-3d}
.back-cover{position:absolute;inset:0;border-radius:7px 12px 12px 7px;background:#0d0a14;
  box-shadow:0 40px 90px -30px #000,0 0 0 1px #ffffff10;transform:translateZ(-10px)}
/* the reading page */
.page{position:absolute;inset:0;border-radius:6px 11px 11px 6px;overflow:hidden;background:
  linear-gradient(90deg,#d9d0bd 0 16px,var(--paper) 26px) , var(--paper);
  box-shadow:inset 22px 0 36px -28px #00000055, inset -6px 0 14px -10px #00000022;
  display:flex;flex-direction:column;z-index:1}
.page-inner{flex:1;overflow-y:auto;padding:clamp(26px,5%,46px) clamp(22px,7%,52px) 10px clamp(34px,9%,64px);color:var(--ink)}
.page-inner::-webkit-scrollbar{width:9px}.page-inner::-webkit-scrollbar-thumb{background:#0000001f;border-radius:8px;border:3px solid transparent;background-clip:padding-box}
.page-foot{flex:none;display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:10px clamp(22px,7%,52px) 14px clamp(34px,9%,64px);border-top:1px solid #00000016;background:#00000006}
.pf-btn,.pf-turn button{appearance:none;background:none;border:1px solid #0000001f;color:var(--ink-2);cursor:pointer;
  font-family:var(--mono);font-size:.7rem;letter-spacing:.05em;padding:8px 12px;border-radius:6px;min-height:40px}
.pf-btn:hover,.pf-turn button:hover{color:var(--ink);border-color:var(--pink)}
.pf-turn{display:flex;align-items:center;gap:10px}
.folio{font-family:var(--mono);font-size:.72rem;color:var(--ink-3);min-width:3.5em;text-align:center}
button[disabled]{opacity:.35;cursor:default}

/* page content */
.ch-eyebrow{font-family:var(--mono);font-weight:500;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:#a06a2e}
.ch-title{font-family:var(--serif);font-weight:600;font-size:clamp(1.9rem,6vw,2.9rem);line-height:1.02;letter-spacing:-.015em;margin:.35rem 0 0;
  background:var(--grad-ink);-webkit-background-clip:text;background-clip:text;color:transparent}
.ch-desc{font-family:var(--serif);font-style:italic;font-size:clamp(1.05rem,2.6vw,1.28rem);color:var(--ink-2);margin-top:.6rem;max-width:46ch}
.ch-body{margin-top:1.5rem;max-width:60ch;color:#3a322a;font-size:1.0rem}
.ch-body p+p{margin-top:.8rem}
.tag{display:inline-flex;align-items:center;gap:.5em;font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-2);padding:5px 11px;border-radius:999px;border:1px solid #0000002a;background:#00000008;margin-top:1rem}
.tag::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--grad)}
.scaffold{margin-top:1.6rem;display:grid;gap:11px;max-width:60ch}
.sk{height:13px;border-radius:7px;background:#00000010}
.sk.w90{width:90%}.sk.w80{width:80%}.sk.w70{width:70%}.sk.w50{width:50%}
.sk-block{height:110px;border-radius:9px;border:1px dashed #0000002e;background:#00000005;display:flex;align-items:center;justify-content:center;
  color:var(--ink-3);font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase}
/* domain cards */
.dgrid{margin-top:1.6rem;display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:520px){.dgrid{grid-template-columns:1fr 1fr}}
.dcard{border:1px solid #0000001f;border-radius:11px;padding:16px 15px;background:#00000006;display:flex;flex-direction:column;gap:8px}
.dc-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.dcard h3{font-family:var(--sans);font-weight:600;font-size:1.05rem;color:var(--ink)}
.dc-dom{font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);flex:none}
.dc-desc{color:#3a322a;font-size:.9rem;flex:1}.dcard .tag{align-self:flex-start;margin-top:.2rem}
/* advert (Chapter 1) */
.advert{display:grid;grid-template-columns:1fr;gap:22px;margin-top:1.3rem}
@media(min-width:560px){.advert{grid-template-columns:150px 1fr;gap:30px;align-items:start}}
.ad-cover{aspect-ratio:3/4;border-radius:4px 8px 8px 4px;background:radial-gradient(70% 50% at 50% 28%,#2a1d3f,#140d22 72%);
  box-shadow:0 18px 42px -18px #00000099, inset 0 0 0 1px #ffffff16;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:18px;text-align:center}
.ad-cover .act{font-family:var(--serif);font-weight:600;font-size:1.12rem;line-height:1.02;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.ad-cover .acn{font-family:var(--mono);font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--bone-2)}
.ad-cover .acstub{margin-top:auto;font-family:var(--mono);font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;color:#ffffff55}
.book-title{font-family:var(--serif);font-weight:600;font-size:clamp(2rem,6vw,2.9rem);line-height:1;letter-spacing:-.02em;background:var(--grad-ink);-webkit-background-clip:text;background-clip:text;color:transparent}
.book-sub{font-family:var(--serif);font-style:italic;font-size:clamp(1.05rem,2.6vw,1.3rem);color:var(--ink-2);margin-top:.5rem;max-width:40ch}
.book-by{font-family:var(--mono);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-top:.8rem}
.ad-blurb{color:#3a322a;font-size:1rem;margin-top:1.1rem;max-width:46ch}
.ad-cta{display:flex;flex-wrap:wrap;gap:10px;margin-top:1.2rem}
.ad-cta .cta{appearance:none;border:none;cursor:default;font-family:var(--mono);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;padding:12px 16px;border-radius:8px;color:#fff;background:linear-gradient(100deg,#ff5a3d,#ff2d78 55%,#b25cff);min-height:44px;box-shadow:0 8px 22px -10px #ff2d7866}
.ad-cta .cta.ghost{background:none;color:var(--ink-2);border:1px solid #0000002e;box-shadow:none}
/* steps (The Approach) */
.steps{list-style:none;margin-top:1.5rem;display:flex;flex-direction:column}
.step{display:flex;gap:16px;align-items:flex-start;padding:16px 4px;border-bottom:1px solid #00000014}
.step:last-child{border-bottom:none}
.step .num{font-family:var(--serif);font-weight:600;font-size:1.7rem;line-height:1;background:var(--grad-ink);-webkit-background-clip:text;background-clip:text;color:transparent;flex:none;min-width:1.7em}
.step .stxt{flex:1}
.step .st-t{font-family:var(--serif);font-weight:500;font-size:1.2rem;color:var(--ink);display:flex;align-items:baseline;gap:.6em}
.step .st-tag{font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
/* contents page */
.toc-head{display:flex;align-items:center;gap:14px;border-bottom:1px solid #0000001a;padding-bottom:16px;margin-bottom:8px}
.toc-head svg{width:46px;height:46px;flex:none}
.toc-head .th-t{font-family:var(--serif);font-weight:600;font-size:1.5rem;color:var(--ink);line-height:1}
.toc-head .th-s{font-family:var(--mono);font-size:.62rem;letter-spacing:.34em;text-transform:uppercase;color:var(--ink-3);margin-top:5px}
.toc-epi{font-family:var(--serif);font-style:italic;color:var(--ink-2);font-size:1.02rem;margin:14px 0 22px;max-width:44ch}
.toc-h{font-family:var(--mono);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px}
.toc-list{list-style:none;display:flex;flex-direction:column}
.toc-item{width:100%;appearance:none;background:none;border:none;cursor:pointer;display:flex;align-items:baseline;gap:10px;
  padding:14px 4px;border-bottom:1px solid #00000014;text-align:left;min-height:48px}
.toc-item:hover .tt{color:#000}.toc-item:hover .ch{color:var(--pink)}
.toc-item .ch{font-family:var(--mono);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);flex:none;transition:color .16s}
.toc-item .tt{font-family:var(--serif);font-weight:500;font-size:1.3rem;color:var(--ink);transition:color .16s}
.toc-item .dots{flex:1;border-bottom:1px dotted #00000040;transform:translateY(-4px)}
.toc-item .pg{font-family:var(--mono);font-size:.8rem;color:var(--ink-3);flex:none}

/* the cover (front) */
.cover{position:absolute;inset:0;transform-origin:left center;transform-style:preserve-3d;z-index:5;cursor:pointer;
  transition:transform 1.05s cubic-bezier(.2,.02,.12,1)}
body[data-open="1"] .cover{transform:rotateY(-162deg)}
.cover .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:6px 11px 11px 6px;overflow:hidden}
.cover .front{background:
  radial-gradient(70% 50% at 50% 30%, #2a1d3f 0%, #140d22 60%, #0d0917 100%);
  box-shadow:inset 0 0 0 1px #ffffff14, 0 40px 90px -30px #000}
.cover .back{transform:rotateY(180deg);background:linear-gradient(120deg,#15101f,#0d0a14);
  box-shadow:inset 0 0 0 1px #ffffff10}
.cover-gl{position:absolute;inset:0;opacity:.5;pointer-events:none}.cover-gl svg{width:100%;height:100%}
.cover-frame{position:absolute;inset:16px;border-radius:5px;border:1px solid #ffffff1f;
  box-shadow:inset 0 0 0 1px #00000040}
.cover-frame::before{content:"";position:absolute;inset:5px;border-radius:3px;border:1px solid #ffffff10}
.cover-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:clamp(40px,9%,70px) 24px;text-align:center;z-index:2}
.cv-top{font-family:var(--mono);font-size:.66rem;letter-spacing:.4em;text-transform:uppercase;color:var(--bone-2);text-indent:.4em}
.cv-mid{display:flex;flex-direction:column;align-items:center;gap:10px}
.cv-name{font-family:var(--serif);font-weight:600;font-size:clamp(2.1rem,8vw,3.1rem);line-height:.98;letter-spacing:-.02em}
.cv-sub{font-family:var(--mono);font-size:.66rem;letter-spacing:.5em;text-transform:uppercase;color:var(--bone-2);text-indent:.5em}
/* lock + key */
.lock{display:flex;flex-direction:column;align-items:center;gap:12px}
.keybtn{appearance:none;background:none;border:none;cursor:pointer;width:clamp(96px,26%,128px);aspect-ratio:1;border-radius:50%;
  display:flex;align-items:center;justify-content:center;position:relative;transition:transform .5s cubic-bezier(.3,.1,.2,1);
  box-shadow:0 0 0 1px #ffffff1f, inset 0 0 30px #00000060}
.keybtn::before{content:"";position:absolute;inset:-6px;border-radius:50%;background:conic-gradient(from 0deg,#ffd23d,#ff2d78,#7c5cff,#22d3ee,#ffd23d);
  opacity:.5;filter:blur(7px);z-index:-1;transition:opacity .3s}
.keybtn:hover::before{opacity:.85}
.keybtn svg{width:84%;height:84%;display:block}
body[data-open="1"] .keybtn{transform:rotate(90deg)}
.keybtn:focus-visible{outline:2px solid var(--violet);outline-offset:4px}
.cv-hint{font-family:var(--mono);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--bone-1);display:flex;align-items:center;gap:.6em}
.cv-hint .pulse{width:7px;height:7px;border-radius:50%;background:var(--grad);animation:pulse 2.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
body[data-open="1"] .cv-hint{opacity:0}

/* page-turn leaf */
.leaf{position:absolute;inset:0;transform-origin:left center;z-index:8;border-radius:6px 11px 11px 6px;
  background:linear-gradient(105deg,#efe7d6,#f4ecdd 60%,#e6dcc8);box-shadow:0 18px 40px -16px #00000066, inset 22px 0 30px -26px #00000055;
  backface-visibility:hidden;opacity:0;pointer-events:none}
.leaf.turn{animation:turn .72s cubic-bezier(.4,.05,.25,1) both}
@keyframes turn{0%{opacity:1;transform:rotateY(0)}100%{opacity:1;transform:rotateY(-176deg)}}

.foot{position:relative;z-index:1;text-align:center;padding:18px 16px 30px;font-family:var(--mono);font-size:.7rem;color:var(--bone-2)}
body[data-open="1"] .foot{display:none}

:focus-visible{outline:2px solid var(--violet);outline-offset:3px;border-radius:3px}
@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
  .leaf.turn{display:none}
}
@media(max-width:680px){
  .tb-brand span{display:none}
  .topbar{flex-wrap:wrap;gap:8px;padding-bottom:6px}
  .tb-brand{order:1}
  .tb-close{order:2;margin-left:auto;padding:8px 10px;font-size:.66rem}
  .tb-nav{order:3;flex:1 1 100%;width:100%;justify-content:flex-start;gap:2px}
  .tb-nav button{padding:9px 11px;font-size:.84rem}
}
@media(max-width:480px){
  .stage{padding:14px 10px 18px}
  .foot{padding:12px 12px 18px}
  .page-inner{padding:20px 18px 8px 26px}
  .page-foot{padding:8px 18px 12px 26px}
  .pf-btn,.pf-turn button{padding:8px 9px;font-size:.64rem}
  .pf-turn{gap:7px}.folio{min-width:2.3em}
  .cover-inner{padding:clamp(24px,6%,70px) 18px}
  .cv-name{font-size:clamp(1.7rem,8.5vw,3.1rem)}
  .ad-cover{max-width:160px}
}
@media(max-width:360px){
  .page-foot{flex-wrap:wrap;justify-content:center;gap:8px;padding:8px 14px 10px 20px}
  .page-inner{padding:16px 14px 6px 20px}
  .cv-top{font-size:.58rem;letter-spacing:.3em}
}
</style>
</head>

  <h2 class="ch-title">The Approach</h2>
  <p class="ch-desc">The four-step framework at the heart of &ldquo;With Love, Math.&rdquo;</p>
  <div class="ch-body">
    <p>Four moves, run in sequence, across any domain. The method doesn&rsquo;t care what you&rsquo;re making &mdash; only that you&rsquo;re making it on purpose.</p>

<template id="tpl-applications">
  <p class="ch-eyebrow">Chapter 3</p>
  <h2 class="ch-title">The Applications</h2>
  <p class="ch-desc">Where the framework already lives &mdash; six domains, one hand.</p>
  <div class="ch-body"><p>Each domain is a place the same method has been put to work. The detail pages are still being written; the shape of the set is below.</p></div>
  <div class="dgrid">
    <article class="dcard">
      <div class="dc-top"><h3>Writing</h3><span class="dc-dom">Language</span></div>
      <p class="dc-desc">The longest-standing voice, and the first domain where the framework found language. Writing is where Design, Wonder, Curiosity, and Plan are most legible &mdash; each sentence a commitment, each paragraph a made thing with intent.</p>
      <span class="tag">In progress</span>
    </article>
    <article class="dcard">
      <div class="dc-top"><h3>UMA Execution</h3><span class="dc-dom">Markets</span></div>
      <p class="dc-desc">Trade execution running on the same four moves: read the market, form the question, follow it until the pattern is clear, commit. One of the least forgiving domains &mdash; where indecision is itself a decision.</p>
      <span class="tag">In progress</span>
    </article>
    <article class="dcard">
      <div class="dc-top"><h3>Tech Hardware</h3><span class="dc-dom">Electronics</span></div>
      <p class="dc-desc">The domain that opened the door to material work. When electronics demanded attention to the physical &mdash; tolerances, components, what fits and why &mdash; it unlocked the analog adjacencies that followed: wood, soil, sound.</p>
      <span class="tag">In progress</span>
    </article>
    <article class="dcard">
      <div class="dc-top"><h3>Horticulture</h3><span class="dc-dom">Living systems</span></div>
      <p class="dc-desc">Arrived by accident; stayed because the method fit. Growing things requires the same sequence as making things &mdash; intention before action, sustained attention through the season, a plan that accounts for what you cannot control.</p>
      <span class="tag">In progress</span>
    </article>
    <article class="dcard">
      <div class="dc-top"><h3>Woodworking</h3><span class="dc-dom">Analog material</span></div>
      <p class="dc-desc">Unlocked through hardware: once the hand was used to working in matter, wood was the natural next material. Four boards at a time, the same framework that works in markets works in a workshop &mdash; define, ask, follow, commit.</p>
      <span class="tag">In progress</span>
    </article>
    <article class="dcard">
      <div class="dc-top"><h3>Audio Production</h3><span class="dc-dom">Sound</span></div>
      <p class="dc-desc">The newest domain, and the fastest entry: two albums in a year. Audio production compresses the framework into sessions &mdash; each track a design problem, each mix a plan executed in real time.</p>
      <span class="tag">In progress</span>
    </article>
  </div>
</template>

<script>
(function(){
  var ORDER=['contents','book','approach','applications','self'];
  var LABEL={contents:'Contents',book:'The Book',approach:'The Approach',applications:'The Applications',self:'The Self'};
  var FOLIO={contents:'—',book:'1',approach:'2',applications:'3',self:'4'};
  var body=document.body, bookEl=document.getElementById('book'), cover=document.getElementById('cover'),
      keybtn=document.getElementById('keybtn'), pageInner=document.getElementById('pageInner'),
      leaf=document.getElementById('leaf'), folio=document.getElementById('folio');
  var cur='contents';
  var reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function setContent(name){
    var t=document.getElementById('tpl-'+name);
    pageInner.innerHTML=''; pageInner.appendChild(t.content.cloneNode(true)); pageInner.scrollTop=0;
    folio.textContent=FOLIO[name];
    document.querySelectorAll('.tb-nav button').forEach(function(b){ b.setAttribute('aria-current', b.dataset.go===name?'true':'false'); });
    var idx=ORDER.indexOf(name);
    var prev=document.querySelector('[data-prev]'), next=document.querySelector('[data-next]');
    prev.disabled = idx<=1; next.disabled = idx>=ORDER.length-1;
    var cb=document.querySelector('.pf-btn'); cb.style.visibility = name==='contents'?'hidden':'visible';
  }
  function go(name, animate){
    if(ORDER.indexOf(name)<0) return;
    if(body.dataset.open!=='1'){ open(); }
    if(name===cur){ return; }
    if(animate && !reduce){
      leaf.classList.remove('turn'); void leaf.offsetWidth; leaf.classList.add('turn');
      setTimeout(function(){ setContent(name); }, 120);
    } else { setContent(name); }
    cur=name;
    if(location.hash.replace('#','')!==name) history.replaceState(null,'','#'+name);
  }
  function open(){
    body.dataset.open='1'; keybtn.setAttribute('aria-expanded','true');
    if(cur) setContent(cur);
    setTimeout(function(){ document.querySelector('.tb-nav button[data-go="contents"]').focus(); }, reduce?0:1000);
  }
  function close(){
    body.dataset.open='0'; keybtn.setAttribute('aria-expanded','false'); keybtn.focus();
    history.replaceState(null,'','#');
  }

  keybtn.addEventListener('click', function(e){ e.stopPropagation(); if(!reduce){ setTimeout(open,360);} else {open();} });
  cover.addEventListener('click', function(){ if(body.dataset.open!=='1'){ if(!reduce){setTimeout(open,360);}else{open();} } });
  keybtn.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); if(!reduce){setTimeout(open,360);}else{open();} }});

  document.addEventListener('click', function(e){
    var g=e.target.closest('[data-go]'); if(g){ e.preventDefault(); go(g.dataset.go, true); return; }
    if(e.target.closest('[data-close]')) close();
    if(e.target.closest('[data-prev]')){ var i=ORDER.indexOf(cur); if(i>1) go(ORDER[i-1],true); }
    if(e.target.closest('[data-next]')){ var j=ORDER.indexOf(cur); if(j<ORDER.length-1) go(ORDER[j+1],true); }
  });
  document.addEventListener('keydown', function(e){
    if(body.dataset.open!=='1') return;
    if(e.target.matches('input,textarea')) return;
    if(e.key==='ArrowRight'){ var j=ORDER.indexOf(cur); if(j<ORDER.length-1){e.preventDefault();go(ORDER[j+1],true);} }
    else if(e.key==='ArrowLeft'){ var i=ORDER.indexOf(cur); if(i>1){e.preventDefault();go(ORDER[i-1],true);} }
    else if(e.key==='Escape'){ close(); }
  });
  window.addEventListener('hashchange', function(){ var n=location.hash.replace('#',''); if(ORDER.indexOf(n)>=0){ if(body.dataset.open!=='1')open(); go(n,false);} });

  setContent('contents');
  var init=location.hash.replace('#','');
  if(ORDER.indexOf(init)>=0){ open(); go(init,false); }
})();
</script>
