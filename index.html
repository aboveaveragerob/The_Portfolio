<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robert Gregory &mdash; Career &amp; Craft</title>

<!-- SEO -->
<meta name="description" content="Robert Gregory — a career in financial operations and the Alastair Zeved maker practice across horticulture, arboriculture, technology, music, and woodworking, with field guides collected in The Atlas.">
<meta name="author" content="Robert Gregory">

<!-- Open Graph / social sharing — update og:url and og:image once your domain is live -->
<meta property="og:type" content="website">
<meta property="og:title" content="Robert Gregory — Career & Craft">
<meta property="og:description" content="Robert Gregory — a career in financial operations and the Alastair Zeved maker practice across horticulture, arboriculture, technology, music, and woodworking, with field guides collected in The Atlas.">
<meta property="og:site_name" content="Robert Gregory">
<meta property="og:url" content="https://alastairzeved.com">
<meta property="og:image" content="https://alastairzeved.com/og-image.png">

<!-- Canonical URL -->
<link rel="canonical" href="https://alastairzeved.com">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap">
<style>
:root{
  --bg:#0b0912; --line:#ffffff14; --line-2:#ffffff22;
  --bone-0:#f3eddf; --bone-1:#d2cad9; --bone-2:#938aa3;
  --paper:#f3ecdd; --paper-2:#e9e0cd; --ink:#211b16; --ink-2:#5b5247; --ink-3:#8a7f6c;
  --pink:#ff2d78; --violet:#b25cff;
  --grad:linear-gradient(100deg,#ffb43d,#ff5a3d 26%,#ff2d78 50%,#b25cff 74%,#43b6ff);
  --grad-ink:linear-gradient(100deg,#d9641a,#d62f5a 30%,#b3266e 52%,#7b3fd6 76%,#236fc9);
  --serif:'Fraunces',Georgia,serif; --sans:'Switzer','Helvetica Neue',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);-webkit-text-size-adjust:100%}
body{background:
    radial-gradient(60% 42% at 50% 62%, #2a153a4d 0%, #12081f00 60%),
    radial-gradient(46% 30% at 84% 16%, #22a7f01f 0%, #22a7f000 70%),
    radial-gradient(50% 34% at 12% 26%, #ff2d7817 0%, #ff2d7800 70%),
    radial-gradient(120% 80% at 50% 0%, #1c1330 0%, var(--bg) 55%);
  background-repeat:no-repeat;background-size:150% 150%;
  animation:bg-drift 34s ease-in-out infinite alternate;
  color:var(--bone-1);
  font-family:var(--sans);line-height:1.45;font-feature-settings:"kern" 1;text-rendering:optimizeLegibility;
  -webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
@keyframes bg-drift{
  0%{background-position:0% 0%,0% 0%,0% 0%,0% 0%}
  50%{background-position:-9% 7%,9% -6%,-6% 9%,0% 0%}
  100%{background-position:8% -9%,-8% 9%,9% -6%,0% 0%}
}
/* aurora: a slow drifting colour bloom so the deep-space void reads as alive, not dead */
body::before{content:"";position:fixed;inset:-25%;z-index:0;pointer-events:none;
  background:
    radial-gradient(40% 34% at 32% 30%, #b25cff33 0%, transparent 68%),
    radial-gradient(38% 30% at 70% 58%, #22a7f02b 0%, transparent 68%),
    radial-gradient(34% 28% at 54% 82%, #ff2d7826 0%, transparent 68%);
  mix-blend-mode:screen;will-change:transform;
  animation:aurora 30s ease-in-out infinite alternate}
@keyframes aurora{
  0%{transform:translate3d(-3%,-2%,0) rotate(-6deg) scale(1)}
  100%{transform:translate3d(4%,3%,0) rotate(8deg) scale(1.16)}}
/* Celestial archive backdrop: a colonnade of light receding under the star-vault,
   its side walls lined with distant volumes rendered as glowing spines. */
.hall{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.hall svg{position:absolute;top:50%;left:50%;width:max(1440px,118vw);height:max(900px,118vh);
  transform:translate(-50%,-50%);opacity:.85;mix-blend-mode:screen;
  animation:hall-drift 46s ease-in-out infinite alternate, hall-hue 40s linear infinite}
@keyframes hall-drift{from{transform:translate(-50%,-50%) scale(1)}to{transform:translate(-50%,-51.5%) scale(1.05)}}
@keyframes hall-hue{0%,100%{filter:hue-rotate(0deg)}50%{filter:hue-rotate(16deg)}}
@media (prefers-reduced-motion: reduce){.hall svg{animation:none}}
.gradtext{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.gradtext-cool{background:linear-gradient(100deg,#5ef2e8,#3b82f6 55%,#7c5cff);-webkit-background-clip:text;background-clip:text;color:transparent}
.stagegl{position:fixed;inset:0;width:100%;height:100%;opacity:.55;pointer-events:none;z-index:0}
.stagegl svg{width:100%;height:100%}
.stagegl svg *{animation:star-twinkle 5s ease-in-out infinite}
.stagegl svg *:nth-child(3n){animation-duration:3.8s;animation-delay:-1.4s}
.stagegl svg *:nth-child(4n){animation-duration:6.4s;animation-delay:-3.1s}
.stagegl svg *:nth-child(5n){animation-duration:4.6s;animation-delay:-2.3s}
@keyframes star-twinkle{0%,100%{opacity:.22}50%{opacity:1}}

/* top bar (only when open) */
.topbar{position:sticky;top:0;z-index:30;display:none;align-items:center;gap:10px;flex-wrap:nowrap;
  padding:10px clamp(12px,4vw,36px);background:#0b0912d9;backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
body[data-open="1"] .topbar{display:flex}
.tb-brand{display:flex;align-items:center;gap:9px;flex:none}
.tb-brand svg{width:30px;height:30px;display:block}
.tb-brand span{font-family:var(--serif);font-weight:500;font-size:1.05rem}
.tb-nav{display:flex;gap:2px;flex:1 1 auto;min-width:0;overflow-x:auto;flex-wrap:nowrap;scrollbar-width:none;-ms-overflow-style:none}
.tb-nav::-webkit-scrollbar{display:none}
.tb-nav>button{flex:none}
.tb-nav button{appearance:none;background:none;border:none;cursor:pointer;font-family:var(--sans);font-weight:500;
  font-size:.86rem;color:var(--bone-2);padding:9px 11px;min-height:40px;border-radius:6px;position:relative;transition:color .16s,background .16s}
.tb-nav button:hover{color:var(--bone-0);background:#ffffff0a}
.tb-nav button[aria-current="true"]{color:var(--bone-0)}
.tb-nav button[aria-current="true"]::after{content:"";position:absolute;left:11px;right:11px;bottom:3px;height:2px;border-radius:2px;background:var(--grad)}
.tb-close{appearance:none;background:none;border:1px solid var(--line-2);color:var(--bone-1);cursor:pointer;
  font-family:var(--mono);font-size:.72rem;letter-spacing:.06em;padding:8px 12px;border-radius:6px;min-height:40px;flex:none}
.tb-close:hover{color:var(--bone-0);border-color:var(--violet)}

/* stage */
.stage{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:clamp(14px,3vw,30px) 16px 60px;gap:clamp(12px,2.4vw,26px)}

/* book */
.book-wrap{perspective:2400px}
.book{position:relative;--pw:min(94vw,540px);width:var(--pw);height:min(700px,calc(100vh - 230px));height:min(700px,calc(100dvh - 230px));transform-style:preserve-3d;
  transition:width 1.05s cubic-bezier(.2,.02,.12,1)}
/* while reading, the top bar appears — shrink the shelf so the reader keeps its height */
body[data-open="1"] .book{height:min(700px,calc(100vh - 250px));height:min(700px,calc(100dvh - 250px))}
.back-cover{position:absolute;inset:0;border-radius:7px 12px 12px 7px;background:#0d0a14;
  box-shadow:0 40px 90px -30px #000,0 0 0 1px #ffffff10;transform:translateZ(-10px)}
/* the reading pages */
.page{position:absolute;top:0;bottom:0;width:var(--pw);overflow:hidden;background:var(--paper);
  display:flex;flex-direction:column}
.page-r{right:0;z-index:2;border-radius:6px 11px 11px 6px;
  background:linear-gradient(90deg,#d9d0bd 0 16px,var(--paper) 26px), var(--paper);
  box-shadow:inset 22px 0 36px -28px #00000055, inset -6px 0 14px -10px #00000022}
.page-l{left:0;z-index:1;border-radius:11px 6px 6px 11px;
  background:linear-gradient(270deg,#d9d0bd 0 16px,var(--paper) 26px), var(--paper);
  box-shadow:inset -22px 0 36px -28px #00000055, inset 6px 0 14px -10px #00000022}
/* two-page spread on wider screens once open */
@media(min-width:820px){
  .book{--pw:min(46vw,468px)}
  body[data-open="1"] .book{width:calc(2*var(--pw))}
}
@media(max-width:819px){ .page-l{display:none} }
.page-inner{flex:1;overflow-y:auto;padding:clamp(26px,5%,46px) clamp(22px,7%,52px) 10px clamp(34px,9%,64px);color:var(--ink)}
.page-l .page-inner{padding:clamp(26px,5%,46px) clamp(34px,9%,64px) 10px clamp(22px,7%,52px)}
.page-inner::-webkit-scrollbar{width:9px}.page-inner::-webkit-scrollbar-thumb{background:#0000001f;border-radius:8px;border:3px solid transparent;background-clip:padding-box}
.page-foot{flex:none;display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:10px clamp(22px,7%,52px) 14px clamp(34px,9%,64px);border-top:1px solid #00000016;background:#00000006}
.pf-btn,.pf-turn button{appearance:none;background:none;border:1px solid #0000001f;color:var(--ink-2);cursor:pointer;
  font-family:var(--mono);font-size:.7rem;letter-spacing:.05em;padding:8px 12px;border-radius:6px;min-height:40px}
.pf-btn:hover,.pf-turn button:hover{color:var(--ink);border-color:var(--pink)}
.pf-turn{display:flex;align-items:center;gap:10px}
.folio{font-family:var(--mono);font-size:.72rem;color:var(--ink-3);min-width:3.5em;text-align:center}
button[disabled]{opacity:.35;cursor:default}

/* page content */
.ch-eyebrow{font-family:var(--mono);font-weight:500;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:#a06a2e}
.ch-title{font-family:var(--serif);font-weight:600;font-size:clamp(1.9rem,6vw,2.9rem);line-height:1.02;letter-spacing:-.015em;margin:.35rem 0 0;
  background:var(--grad-ink);-webkit-background-clip:text;background-clip:text;color:transparent}
.ch-desc{font-family:var(--serif);font-style:italic;font-size:clamp(1.05rem,2.6vw,1.28rem);color:var(--ink-2);margin-top:.6rem;max-width:46ch}
.ch-body{margin-top:1.5rem;max-width:60ch;color:#3a322a;font-size:1.0rem}
.ch-body p+p{margin-top:.8rem}
.tag{display:inline-flex;align-items:center;gap:.5em;font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-2);padding:5px 11px;border-radius:999px;border:1px solid #0000002a;background:#00000008;margin-top:1rem}
.tag::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--grad)}
.scaffold{margin-top:1.6rem;display:grid;gap:11px;max-width:60ch}
.sk{height:13px;border-radius:7px;background:#00000010}
.sk.w90{width:90%}.sk.w80{width:80%}.sk.w70{width:70%}.sk.w50{width:50%}
.sk-block{height:110px;border-radius:9px;border:1px dashed #0000002e;background:#00000005;display:flex;align-items:center;justify-content:center;
  color:var(--ink-3);font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase}
/* domain cards */
.dgrid{margin-top:1.6rem;display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:520px){.dgrid{grid-template-columns:1fr 1fr}}
.page .dgrid{grid-template-columns:1fr}
.dcard{border:1px solid #0000001f;border-radius:11px;padding:16px 15px;background:#00000006;display:flex;flex-direction:column;gap:8px}
.dc-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.dcard h3{font-family:var(--sans);font-weight:600;font-size:1.05rem;color:var(--ink)}
.dc-dom{font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);flex:none}
.dc-desc{color:#3a322a;font-size:.9rem;flex:1}.dcard .tag{align-self:flex-start;margin-top:.2rem}
/* chapter tabs */
.ch-tabs{display:flex;gap:2px;margin-top:1.4rem;border-bottom:1px solid #00000014;padding-bottom:0}
.ch-tab{appearance:none;background:none;border:none;cursor:pointer;font-family:var(--mono);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-3);padding:9px 13px 11px;border-radius:6px 6px 0 0;position:relative;transition:color .15s,background .15s}
.ch-tab:hover{color:var(--ink);background:#00000008}
.ch-tab[aria-selected="true"]{color:var(--ink)}
.ch-tab[aria-selected="true"]::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;border-radius:2px 2px 0 0;background:var(--grad-ink)}
.ch-panel{margin-top:1.2rem}
/* steps (The Approach) */
.steps{list-style:none;margin-top:1.5rem;display:flex;flex-direction:column}
.step{display:flex;gap:16px;align-items:flex-start;padding:16px 4px;border-bottom:1px solid #00000014}
.step:last-child{border-bottom:none}
.step .num{font-family:var(--serif);font-weight:600;font-size:1.7rem;line-height:1;background:var(--grad-ink);-webkit-background-clip:text;background-clip:text;color:transparent;flex:none;min-width:1.7em}
.step .stxt{flex:1}
.step .st-t{font-family:var(--serif);font-weight:500;font-size:1.2rem;color:var(--ink);display:flex;align-items:baseline;gap:.6em}
.step .st-tag{font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
/* contents page */
.toc-head{display:flex;align-items:center;gap:14px;border-bottom:1px solid #0000001a;padding-bottom:16px;margin-bottom:8px}
.toc-head svg{width:46px;height:46px;flex:none}
.toc-head .th-t{font-family:var(--serif);font-weight:600;font-size:1.5rem;color:var(--ink);line-height:1}
.toc-head .th-s{font-family:var(--mono);font-size:.62rem;letter-spacing:.34em;text-transform:uppercase;color:var(--ink-3);margin-top:5px}
.toc-epi{font-family:var(--serif);font-style:italic;color:var(--ink-2);font-size:1.02rem;margin:14px 0 22px;max-width:44ch}
.toc-h{font-family:var(--mono);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px}
.toc-list{list-style:none;display:flex;flex-direction:column}
.toc-item{width:100%;appearance:none;background:none;border:none;cursor:pointer;display:flex;align-items:baseline;gap:10px;
  padding:14px 4px;border-bottom:1px solid #00000014;text-align:left;min-height:48px}
.toc-item:hover .tt{color:#000}.toc-item:hover .ch{color:var(--pink)}
.toc-item .ch{font-family:var(--mono);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);flex:none;transition:color .16s}
.toc-item .tt{font-family:var(--serif);font-weight:500;font-size:1.3rem;color:var(--ink);transition:color .16s}
.toc-item .dots{flex:1;border-bottom:1px dotted #00000040;transform:translateY(-4px)}
.toc-item .pg{font-family:var(--mono);font-size:.8rem;color:var(--ink-3);flex:none}

/* the cover (front) */
.cover{position:absolute;right:0;top:0;bottom:0;width:var(--pw);transform-origin:left center;transform-style:preserve-3d;z-index:5;
  transition:transform 1.05s cubic-bezier(.2,.02,.12,1)}
body[data-open="1"] .cover{transform:rotateY(-162deg);opacity:0;pointer-events:none;
  transition:transform 1.05s cubic-bezier(.2,.02,.12,1),opacity .12s 1s}
.cover .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:6px 11px 11px 6px;overflow:hidden}
.cover .front{background:
  radial-gradient(70% 50% at 50% 30%, #2a1d3f 0%, #140d22 60%, #0d0917 100%);
  box-shadow:inset 0 0 0 1px #ffffff14, 0 40px 90px -30px #000}
.cover .back{transform:rotateY(180deg);background:linear-gradient(120deg,#15101f,#0d0a14);
  box-shadow:inset 0 0 0 1px #ffffff10}
.cover-gl{position:absolute;inset:0;opacity:.5;pointer-events:none}.cover-gl svg{width:100%;height:100%}
.cover-frame{position:absolute;inset:16px;border-radius:5px;border:1px solid #ffffff1f;
  box-shadow:inset 0 0 0 1px #00000040}
.cover-frame::before{content:"";position:absolute;inset:5px;border-radius:3px;border:1px solid #ffffff10}
.cover-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(30px,7vh,64px);
  padding:clamp(40px,9%,70px) 24px;text-align:center;z-index:2}
.cv-top{position:absolute;top:clamp(34px,8%,64px);left:0;right:0;font-family:var(--mono);font-size:.66rem;letter-spacing:.4em;text-transform:uppercase;color:var(--bone-2);text-indent:.4em}
.cv-mid{display:flex;flex-direction:column;align-items:center;gap:10px}
.cv-mid::after{content:"";width:44px;height:2px;border-radius:2px;background:var(--grad);opacity:.6;margin-top:6px}
.cv-name{font-family:var(--serif);font-weight:600;font-size:clamp(1.9rem,7vw,2.7rem);line-height:1.08;letter-spacing:-.02em;overflow-wrap:break-word}
.cv-sub{font-family:var(--mono);font-size:.66rem;letter-spacing:.5em;text-transform:uppercase;color:var(--bone-2);text-indent:.5em}
/* lock + key */
.lock{display:flex;flex-direction:column;align-items:center;gap:12px}
.keybtn{appearance:none;background:none;border:none;cursor:pointer;width:clamp(96px,26%,128px);aspect-ratio:1;border-radius:50%;
  display:flex;align-items:center;justify-content:center;position:relative;transition:transform .5s cubic-bezier(.3,.1,.2,1);
  box-shadow:0 0 0 1px #ffffff1f, inset 0 0 30px #00000060}
.keybtn::before{content:"";position:absolute;inset:-6px;border-radius:50%;background:conic-gradient(from 0deg,#ffd23d,#ff2d78,#7c5cff,#22d3ee,#ffd23d);
  opacity:.5;filter:blur(7px);z-index:-1;transition:opacity .3s;animation:key-halo 14s linear infinite}
.keybtn:hover::before{opacity:.9}
@keyframes key-halo{to{transform:rotate(1turn)}}
.keybtn svg{width:84%;height:84%;display:block}
body[data-open="1"] .keybtn{transform:rotate(90deg)}
.keybtn:focus-visible{outline:2px solid var(--violet);outline-offset:4px}

/* page-turn leaf */
.leaf{position:absolute;right:0;top:0;bottom:0;width:var(--pw);transform-origin:left center;z-index:8;border-radius:6px 11px 11px 6px;
  background:linear-gradient(105deg,#efe7d6,#f4ecdd 60%,#e6dcc8);box-shadow:0 18px 40px -16px #00000066, inset 22px 0 30px -26px #00000055;
  backface-visibility:hidden;opacity:0;pointer-events:none}
.leaf.turn{animation:turn .72s cubic-bezier(.4,.05,.25,1) both}
@keyframes turn{0%{opacity:1;transform:rotateY(0)}100%{opacity:1;transform:rotateY(-176deg)}}

.foot{position:relative;z-index:1;text-align:center;padding:18px 16px 30px;font-family:var(--mono);font-size:.7rem;color:var(--bone-2)}
body[data-open="1"] .foot{display:none}

:focus-visible{outline:2px solid var(--violet);outline-offset:3px;border-radius:3px}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
  .leaf.turn{display:none}
}
@media(max-width:680px){
  .tb-brand span{display:none}
  .topbar{flex-wrap:wrap;gap:8px;padding-bottom:6px}
  .tb-brand{order:1}
  .tb-close{order:2;margin-left:auto;padding:8px 10px;font-size:.66rem}
  .tb-nav{order:3;flex:1 1 100%;width:100%;justify-content:flex-start;gap:2px}
  .tb-nav button{padding:9px 11px;font-size:.84rem}
}
@media(max-width:480px){
  .stage{padding:14px 10px 18px}
  .foot{padding:12px 12px 18px}
  .page-inner{padding:20px 18px 8px 26px}
  .page-foot{padding:8px 18px 12px 26px}
  .pf-btn,.pf-turn button{padding:8px 9px;font-size:.64rem}
  .pf-turn{gap:7px}.folio{min-width:2.3em}
  .cover-inner{padding:clamp(24px,6%,70px) 18px}
  .cv-name{font-size:clamp(1.6rem,8vw,2.7rem)}
  .ad-cover{max-width:160px}
}
@media(max-width:360px){
  .page-foot{flex-wrap:wrap;justify-content:center;gap:8px;padding:8px 14px 10px 20px}
  .page-inner{padding:16px 14px 6px 20px}
  .cv-top{font-size:.58rem;letter-spacing:.3em}
}

/* ===== library: two spine shelves + one reader ===== */
.book{--pw:min(94vw,400px)}
@media(min-width:820px){
  .book{--pw:min(40vw,360px)}
  body[data-open="1"] .book{width:calc(2*var(--pw))}
}
.cover .front.rg{background:radial-gradient(70% 50% at 50% 30%, #14233a 0%, #0e1626 60%, #0b111d 100%)}
.cover .front.at{background:radial-gradient(70% 50% at 50% 30%, #3a2a12 0%, #241a0d 60%, #17110a 100%)}
.gradtext-atlas{background:linear-gradient(100deg,#ffd23d,#ff8a2b 55%,#e0662a);-webkit-background-clip:text;background-clip:text;color:transparent}
.cv-years{font-family:var(--mono);font-size:.62rem;letter-spacing:.28em;text-transform:uppercase;color:var(--bone-2)}

/* the two shelves, stacked across the top */
.shelves{position:relative;z-index:2;width:100%;max-width:880px;margin:0 auto;display:flex;flex-direction:column;gap:clamp(14px,2.6vw,26px)}
.shelf-rail{position:relative;padding:24px 14px 18px}
.shelf-head{position:absolute;top:0;left:0;right:0;text-align:center;font-family:var(--serif);font-style:italic;
  font-size:clamp(.84rem,2.2vw,1.05rem);color:var(--bone-1)}
.shelf-books{display:flex;flex-flow:row nowrap;align-items:flex-end;justify-content:center;gap:clamp(5px,1.1vw,9px);
  overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.shelf-books::-webkit-scrollbar{display:none}
/* a book set slightly apart from its shelf-mates (e.g. The Atlas) */
.shelf-books .spine.apart{margin-left:clamp(10px,2vw,22px)}
/* the ledge each shelf stands on */
.shelf-rail::after{content:"";position:absolute;left:6px;right:6px;bottom:8px;height:9px;border-radius:2px;
  background:linear-gradient(180deg,#3c3552,#191524);
  box-shadow:0 10px 22px -6px #000,inset 0 1px 0 #ffffff2e,inset 0 -1px 0 #00000073}
/* compact the shelves while a book is open so the reader isn't crowded */
body[data-open="1"] .shelves{max-width:780px}
body[data-open="1"] .shelf-head{display:none}
body[data-open="1"] .shelf-rail{padding:8px 14px 16px}
body[data-open="1"] .spine{height:clamp(78px,12vw,108px);justify-content:center}
body[data-open="1"] .sp-title,body[data-open="1"] .sp-year{display:none}
/* each volume: a spine standing on the shelf, its title running up the spine */
.spine{appearance:none;cursor:pointer;position:relative;z-index:1;flex:none;
  width:clamp(34px,4.8vw,46px);height:clamp(122px,19vw,178px);
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;gap:5px;padding:9px 3px 8px;
  color:var(--bone-1);background:var(--sp-bg,linear-gradient(100deg,#241a33,#160f22));
  border:1px solid #ffffff1a;border-top:3px solid var(--sp-accent,#ffffff40);border-radius:3px 3px 2px 2px;
  box-shadow:0 14px 22px -12px #000,inset 0 0 0 1px #ffffff0a,inset -8px 0 16px -10px #00000099,inset 7px 0 10px -8px #ffffff18;
  transition:transform .22s cubic-bezier(.3,.1,.2,1),box-shadow .22s,filter .22s}
.spine:hover{transform:translateY(-12px);box-shadow:0 26px 30px -14px #000}
.spine:focus-visible{outline:2px solid var(--violet);outline-offset:3px}
.spine[aria-current="true"]{transform:translateY(-14px);box-shadow:0 28px 34px -14px #000,0 0 0 1px var(--sp-accent) inset}
.spine[aria-current="true"] .sp-title{color:var(--bone-0)}
.sp-emblem{width:17px;height:17px;flex:none;opacity:.92}
.sp-emblem svg{width:100%;height:100%;display:block}
.sp-title{flex:1;display:flex;align-items:center;justify-content:center;writing-mode:vertical-rl;
  font-family:var(--serif);font-weight:500;font-size:clamp(.62rem,1.5vw,.78rem);line-height:1;letter-spacing:.01em;
  white-space:nowrap;overflow:hidden;color:var(--bone-1);transition:color .18s}
.sp-year{flex:none;writing-mode:vertical-rl;font-family:var(--mono);font-size:.5rem;letter-spacing:.06em;
  color:var(--bone-2);white-space:nowrap}
@media(max-width:520px){
  .shelf-books{justify-content:flex-start}
  .spine{width:clamp(32px,9vw,42px);height:clamp(126px,38vw,158px)}
  /* on narrow screens the spine is too short for title + year — keep the title, drop the year */
  .sp-year{display:none}
  .sp-title{font-size:clamp(.6rem,2.7vw,.74rem)}
}

/* ===== chapter editorial layout ===== */
.hero-ph{margin-top:1.5rem;min-height:210px}
.ph{border:1px dashed #00000030;border-radius:10px;background:#0000000a;display:flex;align-items:center;justify-content:center;
  text-align:center;color:var(--ink-3);font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;
  padding:16px;min-height:150px}
/* category sub-navigation */
.catnav{display:flex;flex-wrap:wrap;gap:7px;padding-bottom:14px;border-bottom:1px solid #00000016;margin-bottom:2px}
.catnav button{appearance:none;background:#00000008;border:1px solid #0000001f;border-radius:999px;cursor:pointer;
  font-family:var(--mono);font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);
  padding:7px 12px;min-height:34px;transition:color .15s,background .15s,border-color .15s}
.catnav button:hover{color:var(--ink);border-color:var(--pink)}
.catnav button[aria-selected="true"]{color:#fff;background:var(--grad-ink);border-color:transparent}
/* field guides carried over from The Atlas — marked so a how-to reads apart from finished work */
.catnav button.is-guide::before{content:"\2726";margin-right:.4em;opacity:.7}
/* a prose section */
.sec{margin-top:1.4rem}
.sec-k{font-family:var(--mono);font-weight:500;font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:#a06a2e}
.sec h3{font-family:var(--serif);font-weight:600;font-size:clamp(1.4rem,3.4vw,1.7rem);line-height:1.04;color:var(--ink);margin:.3rem 0 .1rem}
.sec p{color:#3a322a;font-size:1rem;max-width:62ch;margin-top:.7rem}
.sec .ph{margin-top:1.1rem}
/* real photographs (figure + mono caption), used where a category has committed images */
.shots{margin-top:1.2rem;display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:560px){.shots{grid-template-columns:1fr 1fr}}
.shots .shot.wide,.shots .shot:only-child{grid-column:1/-1}
.shot{margin:0}
.shot img{display:block;width:100%;height:auto;border-radius:10px;border:1px solid #00000018;background:#00000006;image-orientation:from-image}
.shot figcaption{margin-top:7px;font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);text-align:center}
.shot.cover{max-width:340px;margin-inline:auto}
/* audio teasers (native player + mono caption) */
.tracks{margin-top:1.2rem;display:flex;flex-direction:column;gap:12px}
.track{margin:0}
.track figcaption{font-family:var(--mono);font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:5px}
.track audio{width:100%;height:36px}
/* front-matter table of contents (left) reuses .toc-* ; about (right) reuses .ch-body/.steps */
.fm-portrait{margin-top:0}
</style>
</head>

        body:[

            {id:'composting',label:'Composting',h:'Composting',img:'Compost site',body:["Volunteer composting for a South Philadelphia community garden — processing food scraps into finished compost for the beds, and building the signage and training materials that keep contributions sorted right."]},

            {id:'builds',label:'Build Projects',h:'Build Projects',img:'Build in progress',body:["Physical builds for growing — custom hydroponic planters, a climbing apparatus, and a planted wall installation pairing a grass wall with mounted planted tanks, glow accents, and roses."]},

        body:[
          "I've spent my career in financial operations — starting in retail banking, moving into trust administration, and landing on a trading desk where the real work turned out to be systems, not spreadsheets: mapping how a process actually moves, finding where it breaks, and building the guardrails and dashboards that keep it from breaking again.",
          "A B.S. in Accounting gave me the vocabulary; years on a regulated trading desk gave me the instinct for where risk actually hides. Somewhere along the way I stopped treating &ldquo;the numbers&rdquo; and &ldquo;the workflow that produces them&rdquo; as two different jobs.",

      chapters:[
        {id:'brinker',title:'Brinker Capital',desc:'Senior Portfolio Specialist at Brinker Capital, an Orion company — trade execution, workflow design, and the analytics infrastructure built to support both.',hero:'Brinker Capital (an Orion company) · Berwyn, PA',

        {id:'technology',title:'Technology',desc:'Practical write-ups for hardware and software.',hero:'Router hardening · Android dev',
          cats:[
            {id:'router-hardening',label:'Router Hardening',h:'Hardening a Home Router',img:'Router hardening',body:["A plain-language walkthrough for locking down a home WiFi router — the settings that matter, why they matter, and the order to change them in."]},
            {id:'android-dev',label:'Android Dev Path',h:'A Path Into Android Development',img:'Android dev path',body:["A project-based path into Android app development from zero — what to build first and the order that keeps a beginner moving instead of stuck."]},
            {id:'data-privacy',label:'Data Privacy',h:'A Practical Guide to Data Privacy',img:'Data privacy',body:["Start from the uncomfortable premise: if a service is free, you're usually what's being sold. Every day, ordinary tech collects a startling amount about you — not just your name and contacts, but a device fingerprint (IP, screen size, fonts, battery, OS, browser) precise enough that no two setups look alike, plus a running log of where you go, what you click, what you watch, and what you buy.","Don't be reassured by the word &ldquo;anonymous.&rdquo; Stripped of your name, data can still be matched back to you — a few points like where you sleep and where you work are usually enough. Researchers have re-identified real people from &ldquo;anonymized&rdquo; movie ratings and location sets that were supposed to be safe to release.","And it doesn't sit still — it's bought and sold. A whole broker industry stitches app data, purchases, and public records into detailed profiles and sells them to advertisers, insurers, and, increasingly, the government. Once a copy is out there you've lost control of it: more copies mean more breaches, more exposure, and decisions made about you from a profile you never saw.","You can't opt out of all of it, but the floor is higher than most people think. Harden your home router — change the DNS, kill the default admin login, disable remote access, isolate smart devices on their own band. Use a password manager with long, unique passwords. Audit app permissions; that game doesn't need your microphone. Block trackers in your browser. And delete the accounts you stopped using: you stopped using it, it didn't stop using you.","You have rights too, though in the US they're a patchwork. Several states let you see, download, delete, and stop the sale of your data, and tools like SimpleOptOut and JustDeleteMe make the requests less painful. Pennsylvania has no broad law yet — one's been proposed — so for now it's federal protections plus breach-notification rules. None of this means going off-grid. It just means refusing to hand everything over by default.","<em>General information, not legal advice.</em>"]}
          ]},
        {id:'music',title:'Music & Audio Production',desc:'Primers written while learning to produce.',hero:'Production primers',
          cats:[
            {id:'midi',label:'MIDI',h:'MIDI',img:'MIDI primer',body:["MIDI is not sound — it's a set of instructions telling an instrument what to play: start this note, stop that one, play it this hard, move this knob over time. An instrument like Vital turns those instructions into audio. Because it's just instructions, MIDI is tiny, fast, and endlessly editable.","That's what makes it powerful: write an emotional melody once and audition it through a warm pad, a soft lead, or a glassy arp without re-recording a thing — one idea, many feelings. The tradeoff versus audio is easy to hold in your head: MIDI you can still change (notes, key, instrument); audio is the tone captured forever. Write in MIDI for flexibility, bounce to audio when a part is locked, and keep both.","The messages worth knowing are few: note on and off (pitch), velocity (how hard, usually louder and brighter), pitch bend, and control changes like the mod wheel for vibrato or filter movement and the sustain pedal for holding notes into pad-like tails.","In practice you either record MIDI from a keyboard or draw it in REAPER's piano roll — move notes in pitch and time, drag their length, set velocity underneath — then hit play and let the instrument voice it. You're editing the performance, not the recording."]},
            {id:'frequency-spectrum',label:'Frequency Spectrum',h:'The Frequency Spectrum',img:'Frequency spectrum',body:["Frequency is just how fast a sound vibrates, measured in Hertz — low frequencies feel deep, high ones feel bright, and the whole audible range runs from about 20 Hz to 20 kHz. Learn where things live on that map and mixing stops being guesswork.","The bands each have a job. Sub (20–60 Hz) you feel more than hear; bass (60–120 Hz) is punch and note definition; the low-mids (120–400 Hz) are warmth — and where a mix turns to mud. The mids (400 Hz–2.5 kHz) carry clarity and words; presence (2.5–5 kHz) is detail that goes harsh if you overdo it; the air up top (10 kHz+) is shimmer that turns to hiss.","When two sounds fight for the same band they mask each other, and the fix is usually subtractive: instead of boosting the vocal, dip a small notch out of whatever's covering it. A −2 to −4 dB cut around 2 kHz in the pad does more than any boost, with none of the harshness.","Two habits keep a mix clean — high-pass anything that isn't kick or bass so the low-mids don't pile up, and roll the lows off your reverb buses so the space doesn't muddy the room. For harshness, sweep a narrow band between 2.5 and 5 kHz, find the spot that stings, and cut it a couple dB: you keep the emotion and lose the sting.","And keep the bottom mono — club systems sum the lows, so a wide sub can cancel out in the real world. Center the sub and kick, save your width for pads and sparkle, and remember the best EQ move is often just choosing a sound that already fits: a darker pad in the verse, an open one in the drop, so the spectrum makes room for the vocal up close and blooms wide when it counts."]},
            {id:'effects-arrangement',label:'Effects & Arrangement',h:'Effects & Arrangement',img:'Effects & arrangement',body:["Most effects share one idea: wet versus dry. Dry is the original sound; wet is the processed version — the reverb tail, the echo, the EQ'd signal. A wet/dry control just balances the two, and the clean way to work is to put reverb or delay on its own bus at 100% wet and blend the amount with each track's send, so the direct sound stays clear and the space is mixed separately.","Reverb is the sound of a room — short and bright feels intimate, long and lush feels epic. A short plate keeps a vocal close but polished; a hall opens the world for pads in a drop. Keep the vocal's plate short and steady across the whole song so it stays close, and send the pads to a bigger space when the drop hits — then EQ the reverb bus to roll off the lows so the space doesn't turn cloudy.","Delay repeats the sound in time and adds rhythm, width, and drama. Time sets when the echo lands, feedback sets how many repeats, and filtering the repeats — rolling off lows and highs — tucks them behind the lead instead of cluttering it.","Arrangement is where the effects earn their keep: the same loop becomes a story through contrast — strip it back to a close, human verse, build tension by opening filters and adding a quiet arp, then release into a wide, rich drop. Bigger should come from width, harmony, and layering, not just from turning it up."]},
            {id:'edm-fundamentals',label:'EDM Fundamentals',h:'EDM Production Fundamentals',img:'EDM fundamentals',body:["Before the genre tricks make sense you need the toolkit, jargon-free. There are only a handful of tools and each does one thing: EQ turns bands up or down, a compressor evens out loud and quiet, a limiter stops the master going over, and a saturator adds warmth to anything lifeless.","Then the tools that move air. Sidechain makes one sound duck when another hits — the synth breathing under the kick. Automation tells a knob what to do over time; panning slides a sound left or right to give layers room; an LFO or volume-shaper makes pads bounce without a kick. And for space: reverb for depth, delay for echo, a reverse-reverb swell to build emotion, and a stereo widener on pads and vocals — never on the bass.","Most mix problems have a stock fix. Too harsh? Cut a few dB around 2–5 kHz. Kick disappearing? Sidechain the synth and bass harder. Mix feels flat? Add panning and a little reverb or delay. Muddy vocals? Send them to reverb and delay and duck the sends instead of drowning the dry.","Chains are just tools in order. A vocal runs EQ → compressor → de-esser, then reverb and delay on sends; a pad runs EQ → sidechain → reverb → widener; a drop lead stacks saturator → EQ → delay → reverb → compressor → sidechain. Learn the order once and you stop reaching randomly.","None of it is really about the plugins, though. The bigger project is building the ear and the mindset — learning to hear what a track needs and having the tools ready when you do. Get the fundamentals solid and everything genre-specific after them is just seasoning."]},
            {id:'what-is-production',label:'What Is Music Production',h:'What Is Music Production?',img:'Production overview',body:["Music production is the whole path from an idea to a finished, listenable track, and it wears three hats: writing (the melody, chords, and rhythm — the song you'd still recognize on a bare piano), sound design (choosing and shaping the instruments that carry it), and mixing and mastering (presenting it clearly so it holds up on earbuds, in a car, and in a club). In a home studio one person wears all three — that's you.","It helps to work to one emotion. Pick a single word — bittersweet, resolute, wide-eyed — and let it be the north star for every choice, because the listener never sees the session; they feel the arc.","From there it's a sequence, not a single button: build a short loop that already moves you (if eight bars don't, an arrangement won't fix it), give every sound a job so nothing fights for the same space, then sketch the sections — intimate verse, build, wide drop, breathe, final drop, outro. Contrast is what makes the emotion land.","Vocals go on last, as the narrator — kept close and mostly dry in the verse, given room in the drop. Then you mix for balance first and reach for EQ and compression second, and premaster with headroom (peaks near −6 dBFS) so the master has room to breathe. None of it is one big skill; it's a handful of small ones in order."]},
            {id:'signal-flow',label:'Signal Flow',h:'Signal Flow',img:'Signal flow',body:["Signal flow is the path your sound takes from the moment it's made to the moment it reaches your ears: source, then the track's plugins in order, then the fader, then any sends to buses, then the master. Know the path and you can predict what a change will do; don't, and mixing feels random.","Order matters because every plugin hears the one before it. A reverb inserted straight onto a vocal runs the whole voice through the room and pushes it back; the same reverb on a shared bus, fed by a send, lets you blend in just enough space while the dry vocal stays close and clear. That one distinction is how you get an in-the-room verse.","Sends have two modes worth knowing: post-fader follows the track fader (turn the vocal down and its reverb follows) and is what you want most of the time; pre-fader ignores the fader, so you can throw a single word into a delay and pull the voice out from under it.","Sidechaining lives in the flow too — route the kick to a compressor on the pad or bass so the low end ducks a couple dB on every hit and the kick always has its moment. Get the plumbing right and the emotional choices get easy: clean, direct routes for intimate verses; parallel sends and wider returns for drops that open up."]},
            {id:'gain-staging',label:'Gain Staging',h:'Gain Staging',img:'Gain staging',body:["Gain staging is keeping healthy levels at every step — from the instrument, through the plugins, to the buses, to the master — so nothing distorts and every tool behaves. Think safe water pressure: too little and nothing works, too much and pipes burst.","The scale that matters in the box is dBFS, where 0 is the hard ceiling; go over and the signal clips into harsh distortion, so you leave headroom. While you build, aim individual tracks around −18 to −10 dBFS at their loudest and the master around −6 dBFS on the drop, with no limiter on the master while you mix.","Fix levels as early as you can — turn a hot synth down at its own output instead of fighting it later — and level-match inside each plugin chain so you're judging tone, not loudness (the oldest trap in mixing is thinking louder means better). Feed a compressor or saturator its sweet spot, then match the output so bypassed and active sound equally loud.","Really it's about contrast. Peaks keep you clear of clipping; average loudness tells the story — the verse should feel quieter than the drop on purpose. If the drop sounds crushed instead of big, you're out of headroom: pull everything down together and build size from width, harmony, and layering, not from shoving the faders up."]},
            {id:'routing-buses',label:'Routing & Buses',h:'Routing & Buses',img:'Routing & buses',body:["This is the plumbing of a session, in plain English. A bus is just a track that other tracks feed into so you can treat them together; a send copies a slice of a track's signal off to a bus without pulling it out of the mix. Get the plumbing right and the emotional choices get easy.","Buses earn their keep four ways: consistency (one reverb makes everything sound like the same room), speed (one fader moves a whole group), CPU (one plugin instead of thirty), and color (a parallel bus adds grit or glue without touching the dry signal). REAPER gives you two ways to build them — folder buses, where child tracks nest under a parent, and aux buses you feed with sends. Folders for groups like DRUMS, MUSIC, and VOX; aux buses for shared effects like VERB, HALL, and DELAY.","Sends come in two flavors. Post-fader follows the track's fader — pull the vocal down and its reverb comes with it, which is what you want most of the time. Pre-fader ignores the fader, which is how you get a delay throw: automate a pre-fader send on a single word, drop the vocal for half a beat, and let the echo spotlight that one syllable.","Sidechaining is what gives the music its bounce. Route the kick to a compressor on the pad or bass through an aux channel, tell the compressor to listen to that channel, and dial in a 2–4 dB duck on every kick. Keep the sub out of it — you want the low end solid, not gasping.","The core template is small on purpose: DRUMS, MUSIC, and VOX folders plus VERB, HALL, and DELAY sends. Keep a short plate on the vocal for intimate verses, open the hall for wide drops, and you're steering the listener's whole sense of space with a couple of faders. The usual mistakes are double-routing a folder and its children to the master, or looping a bus back into itself — keep the signal flowing one way and it stays clean."]},
            {id:'time-rhythm',label:'Time & Rhythm',h:'Time & Rhythm',img:'Time & rhythm',body:["Rhythm is how music sits on a timeline. A beat is one steady pulse; tempo is how fast those beats arrive, in BPM; a bar is a box holding a fixed number of beats; and a time signature says how many go in each box. 4/4 — four beats to the bar — is home for dance music because your body already understands it: one pulse per step, nothing to think about.","Detail lives in the subdivisions (halves, quarters, eighths, sixteenths, triplets) and in where you put the accents. The backbeat — claps and snares on 2 and 4 — is what makes you move; four-on-the-floor, a kick on every beat, is the heartbeat under most of it. For an emotional-but-danceable feel, ~118–128 BPM is the pocket: slower reads reflective, faster reads club.","Build a groove from the floor up — kick on every beat, clap on 2 and 4, hats in eighths — then lay a long, slightly dark pad underneath and a simple sub on the root so the low end supports without cluttering.","Two tools keep it human: quantization snaps notes to the grid for tightness, but lean on it too hard and the life drains out; humanization adds tiny timing and velocity variations so a programmed part feels played. A little swing — nudging the off-beats late — relaxes the whole thing. The steady grid is what frees the vocal and pads to carry the story."]},
            {id:'synth-building',label:'Synth Building',h:'Building a Synth Patch',img:'Synth building',body:["A synth is a sound you build instead of record, and Vital is a wavetable synth — its raw material is a set of stored shapes you can scan through. The signal runs a little factory line: MIDI notes tell it what to play, oscillators make the raw sound, a filter shapes the tone, effects add space, and the output sets the level.","Oscillators are the ingredient. A sine is pure and deep (great for sub-bass); a saw is bright and rich (pads and leads); a square is hollow and woody; noise adds breath and attack. Stack copies with unison, nudge them apart with detune, and spread them across the stereo field for width — a little detune is warm, a lot gets messy.","The filter is a sieve for sound. A low-pass keeps the lows and rolls off the highs to make something warmer and darker — perfect for a verse; a high-pass clears mud off sparkle layers so they don't fight the bass. Cutoff is the main tone knob, resonance adds a whistle or vowel at the cutoff, and key-tracking keeps the brightness even across the keyboard.","Envelopes shape how a parameter moves over time — ADSR: attack (how fast it fades in, from an instant pluck to a blooming pad), decay, sustain (the level held while the key is down), and release (the tail after you let go). Put it together and a patch becomes something you design on purpose — a dark pad that blooms in the verse, an open one that widens in the drop — instead of a preset you settled for."]}
          ]},
        {id:'woodworking',title:'Woodworking',desc:'Build walkthroughs, cut list to final coat.',hero:'Weatherproof enclosure build',
          cats:[
            {id:'enclosure',label:'Weatherproof Enclosure',h:'Building a Weatherproof Outdoor Enclosure',img:'Enclosure walkthrough',body:["A step-by-step walkthrough for framing, siding, and finishing a weatherproof outdoor enclosure — from cut list to the final coat of sealant."]},
            {id:'pony-wall',label:'Pony Wall',h:'Building a Pony Wall',img:'Pony wall build',body:["A pony wall is a short, non-load-bearing half wall — knee- to counter-height — and it frames up like any stud wall, just lower. You need 2x4s for the top and bottom plates and the studs, drywall if you're finishing it, and either wood screws for a subfloor or Tapcon masonry screws for concrete to anchor the bottom plate.","Lay it out first: mark the wall's line on the floor, square to the existing walls, then mark studs 16 inches on-center on both plates. Build the frame flat on the ground — studs screwed to the top and bottom plates, toe-screwed for grip — then stand it up and anchor the bottom plate every 16–24 inches, shimming until it's dead level.","Because it's freestanding at one end, bracing is the whole game: tie the end stud to the nearest wall with L-brackets, add a 45° diagonal brace inside the frame, or run a post up to the ceiling — whatever the spot allows.","Finish it like any wall — half-inch drywall, then tape, mud, and sand two or three coats to a seamless face, prime and paint, and trim the base to match the room. Or skip the drywall and cap it with a 1x6 or 2x6 plank for a warmer, furniture-like top."]},
            {id:'route-edges',label:'Routing Edges',h:'Routing a Finished Edge',img:'Routed edge',body:["A router turns a raw sawn edge into a finished one, and the whole job is choosing a bit and moving in the right direction. A roundover bit softens the edge to a curve; a bevel bit cuts a clean angle. Set the depth to match the bit's radius or angle, and clamp the workpiece down with room for the router base to ride flat.","If you've got a scrap of the same stock, test on it first. Then let the router reach full speed before it touches the wood and move in one steady, continuous pass, keeping the base flat the whole way.","The one rule that saves you: move against the spin of the bit — counter-clockwise around the outside of a piece — so the router pulls into the work instead of skating and digging in. Flip the board and repeat so every visible edge matches.","Finish with a light pass of fine-grit sandpaper to knock down any burrs, then vacuum the dust off before the next step. It's a small operation that's the difference between an edge that looks built and one that looks cut."]},
            {id:'non-load-bearing-wall',label:'Partition Wall',h:'Building a Non-Load-Bearing Wall',img:'Partition wall build',body:["A non-load-bearing partition carries nothing but itself, so you can put up a full-height one without touching the structure — the trick is anchoring it top and bottom without tearing anything up. Find the ceiling joists for the top plate, and bond the floor plate down with heavy-duty VHB tape instead of drilling a finished floor.","Set the plates first: cut the top plate to length, level and shim it, and screw it into the joists; clean the floor with alcohol, tape the bottom plate, and press it in directly under the top one. Then measure between the plates, cut the studs a hair short so they drop in, and fasten them with angled or pocket screws.","Stability comes from bracing — L-brackets tying the partition to the existing wall at top, middle, and bottom, plus 45° diagonal blocks between studs. From there it's drywall on both faces, screws into every stud at 12 inches, then joint compound over the seams and screw heads.","Finishing is patience: two coats of compound with a sanding in between, feathered flat, then prime, paint, and base molding to match the room. Done right, a wall that holds nothing up looks exactly like one that does."]},
            {id:'ottoman-table',label:'Ottoman Table',h:'Building a C-Shaped Ottoman Table',img:'Ottoman table build',body:["A C-shaped ottoman table is a small hardwood piece that slides in over a couch or bed — a flat top on two side panels, open on one side like the letter C, on casters or a rail so it rolls in and out. The build is all in the joinery: one-inch hardwood for the top and sides, joined with glued dowels rather than visible fasteners.","Cut clean — a 40.5 by 20-inch top and two 18-inch sides on the table saw — and rout the edges if you want them softened. Then mark and drill the dowel holes with a jig and a stop collar so every hole lands at the same depth and the panels pull up square.","Dry-fit the whole thing before any glue touches it: assemble it dry to confirm the fit, then glue the dowels and holes, tap it together with a rubber mallet, and clamp it until it sets. Skipping the dry fit is how you end up clamping a mistake.","Finish by sanding up through the grits, wiping clean, and laying on polyurethane a coat at a time with a light sanding between. Add casters or a track underneath and felt pads to save the floor, and it slides where you need it and disappears when you don't."]},
            {id:'drywall-repair',label:'Drywall Repair',h:'Stripping, Repairing & Repainting Drywall',img:'Powder-room drywall',shots:[{src:'images/woodworking/powder-room-drywall.jpeg',cap:'Powder room — wallpaper stripped to bare drywall',wide:true}],body:["Stripped wallpaper leaves a wall that looks wrecked — torn paper face, old adhesive, ragged edges — and the repair is less about patching holes than getting back to a flat, sealed, paintable surface. First strip everything loose; for stubborn glue, a spray of one-part vinegar to two-parts boiling water, left to sit, scrapes right off. Feather any sharp ridges with 80–120 grit until the wall is flat to the touch.","The step people skip is sealing. A coat of a clear problem-surface sealer (Zinsser Gardz) locks down the fuzzy torn paper and old adhesive so your joint compound doesn't blister and the old surface doesn't flash through the paint. It rolls on milky and dries clear in half an hour.","Then you skim-coat: all-purpose joint compound thinned with a little water to a pourable, pancake-batter consistency, rolled on thick with a high-nap roller and immediately pulled flat with a wide taping knife held at a low angle. The move that makes it seamless is feathering — two-thirds of the knife over the mud, one-third on bare wall, all the pressure on the bare side, dragging the edge paper-thin.","Let each coat dry fully — a day in winter — then a second, lighter coat and a final sanding until, eyes closed and hand on the wall, you can't feel an edge or a dip. Prime, paint, and it reads like the damage was never there."]},
            {id:'signpost',label:'Outdoor Signpost',h:'Building an Outdoor Signpost',img:'Signpost build',body:["Building a freestanding outdoor signpost — the post, the footing, and the mounting that keeps a sign upright and readable through the seasons. Built for the community-garden signage, so it lives in both the Woodworking and Composting shelves. <em>Full write-up in progress from the build notes.</em>"]}
          ]}
      ]
    }
  };

  var curVol=null, activeCat={};

  // ---- volumes: each spine is one volume, mapped onto the existing DATA ----
  // shelf 'career' (top, resume order, current first) - 'craft' (bottom, A-Z)
  var VOLUMES=[
    {id:'brinker',shelf:'career',title:'Brinker Capital',spine:'Brinker',years:'Feb 2021 - Present',sy:'2021–',src:'career',ch:'brinker',accent:'#5ef2e8'},
    {id:'pnc-wm',shelf:'career',title:'PNC Wealth Management',spine:'PNC Wealth',years:'2019 - 2021',sy:'2019–21',src:'career',ch:'pnc',cats:['trust'],accent:'#3b82f6'},
    {id:'pnc-bank',shelf:'career',title:'PNC Bank',years:'2017 - 2019',sy:'2017–19',src:'career',ch:'pnc',cats:['branch'],accent:'#4f7bff'},
    {id:'eddiebauer',shelf:'career',title:'Eddie Bauer',years:'2013 - 2017',sy:'2013–17',src:'career',ch:'eddiebauer',accent:'#7c5cff'},
    {id:'education',shelf:'career',title:'Education & Licensing',spine:'Education',src:'career',ch:'education',accent:'#9b7cff'},
    {id:'skillset',shelf:'career',title:'Skillset & Technologies',spine:'Skillset',src:'career',ch:'skillset',accent:'#b25cff'},
    {id:'volunteering',shelf:'career',title:'Volunteering & Community Engagement',spine:'Volunteering',src:'career',ch:'volunteering',accent:'#22a7f0'},
    {id:'arboriculture',shelf:'craft',title:'Arboriculture',src:'portfolio',ch:'arboriculture',accent:'#43b6ff'},
    {id:'composting',shelf:'craft',title:'Composting',src:'portfolio',ch:'composting',guides:[['woodworking','signpost']],accent:'#8b5e3c'},
    {id:'horticulture',shelf:'craft',title:'Horticulture',src:'portfolio',ch:'horticulture',exclude:['hydroponics'],accent:'#5ef2a0'},
    {id:'hydroponics',shelf:'craft',title:'Hydroponics',src:'portfolio',ch:'horticulture',cats:['hydroponics'],guides:[['horticulture','planting-in-pon'],['horticulture','why-pon-works']],accent:'#22d3ee'},
    {id:'music',shelf:'craft',title:'Music & Audio Production',spine:'Music & Audio',src:'portfolio',ch:'music',guides:[['music','what-is-production'],['music','signal-flow'],['music','gain-staging'],['music','routing-buses'],['music','time-rhythm'],['music','synth-building'],['music','midi'],['music','frequency-spectrum'],['music','effects-arrangement'],['music','edm-fundamentals']],accent:'#b25cff'},
    {id:'technology',shelf:'craft',title:'Technology',src:'portfolio',ch:'technology',guides:[['technology','router-hardening'],['technology','android-dev'],['technology','data-privacy']],accent:'#ff8a2b'},
    {id:'woodworking',shelf:'craft',title:'Woodworking',src:'portfolio',ch:'woodworking',guides:[['woodworking','enclosure'],['woodworking','pony-wall'],['woodworking','non-load-bearing-wall'],['woodworking','route-edges'],['woodworking','ottoman-table'],['woodworking','drywall-repair'],['woodworking','signpost']],accent:'#ff5a3d'}
  ];
  var SHELF_LABEL={career:'The Career of Robert Gregory',craft:'The Craft of Alastair Zeved'};
  var SHELF_BRAND={career:'Robert Gregory',craft:'Alastair Zeved'};
  function byId(id){ for(var i=0;i<VOLUMES.length;i++){ if(VOLUMES[i].id===id) return VOLUMES[i]; } return null; }
  function curV(){ return byId(curVol); }
  function shelfVols(sh){ return VOLUMES.filter(function(v){return v.shelf===sh;}); }
  function srcChapter(V){ var cs=DATA[V.src].chapters; for(var i=0;i<cs.length;i++){ if(cs[i].id===V.ch) return cs[i]; } return null; }

  // the categories a volume shows, as {cat, dom}
  // look up a guide category that lives in The Atlas (redistributed into a Craft volume)
  function atlasCat(chId,catId){
    var chs=DATA.atlas.chapters;
    for(var i=0;i<chs.length;i++){ if(chs[i].id===chId){
      for(var j=0;j<chs[i].cats.length;j++){ if(chs[i].cats[j].id===catId) return chs[i].cats[j]; }
    } }
    return null;
  }
  function volCats(V){
    var ch=srcChapter(V), list=ch.cats;
    if(V.cats){ list=V.cats.map(function(id){ return ch.cats.filter(function(k){return k.id===id;})[0]; }); }
    else if(V.exclude){ list=ch.cats.filter(function(k){ return V.exclude.indexOf(k.id)<0; }); }
    var out=list.map(function(k){ return {cat:k,dom:ch.title}; });
    // append any field guides carried over from The Atlas, marked as guides
    if(V.guides){ V.guides.forEach(function(g){ var k=atlasCat(g[0],g[1]); if(k) out.push({cat:k,dom:'Field Guide',guide:true}); }); }
    return out;
  }
  function volMeta(V){
    var ch=srcChapter(V);
    return {eyebrow:SHELF_LABEL[V.shelf],desc:ch.desc,hero:ch.hero,years:V.years||''};
  }

  // ---- emblems (the key motif) ----
  function keyEmblem(id,stops){
    return '<svg viewBox="0 0 100 100" fill="none" stroke="url(#'+id+')" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+
      '<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="1" y2="1">'+stops+'</linearGradient></defs>'+
      '<circle cx="50" cy="36" r="15"/><path d="M57 23 A15 15 0 0 1 57 49 A11 11 0 0 0 57 23 Z" stroke-width="3"/>'+
      '<circle cx="50" cy="36" r="2.6" fill="url(#'+id+')" stroke="none"/><path d="M50 51 L50 72 C50 81 56 83 62 79"/></svg>';
  }
  var STOPS={
    career:'<stop offset="0%" stop-color="#5ef2e8"/><stop offset="50%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#7c5cff"/>',
    craft:'<stop offset="0%" stop-color="#ffb43d"/><stop offset="45%" stop-color="#ff2d78"/><stop offset="100%" stop-color="#7c5cff"/>'
  };
  var SHELF_EMBLEM={career:keyEmblem('tbc',STOPS.career),craft:keyEmblem('tbp',STOPS.craft)};

  // ---- the two shelves of spines ----
  function shade(hex,al){
    var h=hex.replace('#',''); if(h.length===3){h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];}
    var r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
    return 'rgba('+r+','+g+','+b+','+al+')';
  }
  function spineHTML(V,uid){
    var stops=V.shelf==='career'?STOPS.career:STOPS.craft;
    var yr=V.sy?'<span class="sp-year">'+V.sy+'</span>':'';
    return '<button class="spine'+(V.apart?' apart':'')+'" data-vol="'+V.id+'" aria-current="'+(V.id===curVol?'true':'false')+'"'+
      ' style="--sp-accent:'+V.accent+';--sp-bg:linear-gradient(100deg,'+shade(V.accent,0.20)+','+shade(V.accent,0.06)+')"'+
      ' title="'+V.title+(V.years?' · '+V.years:'')+'">'+
      '<span class="sp-emblem">'+keyEmblem('sp'+uid,stops)+'</span>'+
      '<span class="sp-title">'+(V.spine||V.title)+'</span>'+yr+'</button>';
  }
  function buildShelves(){
    [['career','shelfCareer'],['craft','shelfCraft']].forEach(function(pair){
      var host=document.querySelector('#'+pair[1]+' .shelf-books');
      host.innerHTML=shelfVols(pair[0]).map(function(v,i){return spineHTML(v,pair[0]+i);}).join('');
    });
  }
  function markCurrent(){
    document.querySelectorAll('.spine').forEach(function(b){ b.setAttribute('aria-current', b.dataset.vol===curVol?'true':'false'); });
    var nav=document.getElementById('tbNav');
    if(nav){ Array.prototype.forEach.call(nav.children,function(b){ b.setAttribute('aria-current', b.dataset.vol===curVol?'true':'false'); }); }
  }
  function buildNav(sh){
    var nav=document.getElementById('tbNav'); nav.innerHTML='';
    shelfVols(sh).forEach(function(v){
      var b=document.createElement('button'); b.dataset.vol=v.id; b.textContent=(v.spine||v.title);
      b.setAttribute('aria-current', v.id===curVol?'true':'false'); nav.appendChild(b);
    });
    document.getElementById('tbBrand').textContent=SHELF_BRAND[sh];
    document.getElementById('tbEmblem').innerHTML=SHELF_EMBLEM[sh];
  }

  function render(){
    var V=curV(); if(!V) return;
    var bk=document.getElementById('book');
    var meta=volMeta(V), cats=volCats(V);
    var sel=activeCat[V.id]||cats[0].cat.id;
    var entry=cats.filter(function(x){return x.cat.id===sel;})[0]||cats[0];
    var yrs=meta.years?'<p class="ch-eyebrow" style="color:var(--ink-3);margin-top:.5rem">'+meta.years+'</p>':'';
    var hero=meta.hero?'<div class="ph hero-ph">'+meta.hero+'</div>':'';
    var lh='<p class="ch-eyebrow">'+meta.eyebrow+'</p><h2 class="ch-title">'+V.title+'</h2>'+yrs+
      '<p class="ch-desc">'+meta.desc+'</p>'+hero;
    var nav='<div class="catnav">'+cats.map(function(x){return '<button data-cat="'+x.cat.id+'"'+(x.guide?' class="is-guide"':'')+' aria-selected="'+(x.cat.id===sel?'true':'false')+'">'+x.cat.label+'</button>';}).join('')+'</div>';
    var k=entry.cat, ps=k.body.map(function(p){return '<p>'+p+'</p>';}).join('');
    var img=k.img?'<div class="ph">'+k.img+'</div>':'';
    var shots=k.shots?'<div class="shots">'+k.shots.map(function(s){var c=(s.cap||'').replace(/"/g,'&quot;');return '<figure class="shot'+(s.wide?' wide':'')+(s.cover?' cover':'')+'"><img loading="lazy" src="'+s.src+'" alt="'+c+'"><figcaption>'+(s.cap||'')+'</figcaption></figure>';}).join('')+'</div>':'';
    var audio=k.audio?'<div class="tracks">'+k.audio.map(function(a){return '<figure class="track"><figcaption>'+(a.title||'')+'</figcaption><audio controls preload="none" src="'+a.src+'"></audio></figure>';}).join('')+'</div>':'';
    var rh=nav+'<div class="sec"><p class="sec-k">'+entry.dom+'</p><h3>'+k.h+'</h3>'+ps+(shots||img)+audio+'</div>';
    var L=bk.querySelector('.page-l .page-inner'), R=bk.querySelector('.page-r .page-inner');
    if(spreadMQ.matches){ L.innerHTML=lh; R.innerHTML=rh; } else { L.innerHTML=''; R.innerHTML=lh+rh; }
    L.scrollTop=0; R.scrollTop=0;
    var sv=shelfVols(V.shelf), pos=sv.indexOf(V);
    bk.querySelector('.folio').textContent=(pos+1)+' / '+sv.length;
    bk.querySelector('[data-prev]').disabled=pos<=0;
    bk.querySelector('[data-next]').disabled=pos>=sv.length-1;
    markCurrent();
  }
  (spreadMQ.addEventListener?spreadMQ.addEventListener.bind(spreadMQ,'change'):spreadMQ.addListener.bind(spreadMQ))(render);

  // dress the closed cover for a volume
  function dressCover(V){
    var bk=document.getElementById('book');
    var front=bk.querySelector('.cover .front');
    front.className='face front '+(V.shelf==='career'?'rg':'');
    var meta=volMeta(V);
    bk.querySelector('.cv-top').textContent=meta.eyebrow;
    var nm=bk.querySelector('.cv-name'); nm.textContent=V.title;
    nm.className='cv-name '+(V.shelf==='career'?'gradtext-cool':'gradtext');
    bk.querySelector('.cv-sub').textContent=(V.shelf==='career'?'A Career':'A Craft');
    bk.querySelector('.cv-years').textContent=(V.years||'');
  }

  function activateVolume(id, updateHash, keepOpen){
    var V=byId(id); if(!V) return; curVol=id;
    dressCover(V); buildNav(V.shelf); buildShelves();
    body.dataset.open = keepOpen?'1':'0';
    render();
    if(keepOpen && !reduce){ var lf=document.getElementById('book').querySelector('.leaf'); lf.classList.remove('turn'); void lf.offsetWidth; lf.classList.add('turn'); }
    if(updateHash!==false){ history.replaceState(null,'','#'+id); }
  }
  function openActive(focus){
    body.dataset.open='1'; render();
    if(focus!==false){ setTimeout(function(){ var n=document.getElementById('tbNav'); if(n.firstChild) n.firstChild.focus(); }, reduce?0:900); }
  }
  function openWith(){ if(!reduce){ setTimeout(function(){openActive(true);},360); } else openActive(true); }
  function closeBook(){ body.dataset.open='0'; render(); }
  // pick a book off the shelf: arrives closed, awaiting its key
  function switchTo(id){
    if(!byId(id)) return;
    if(id===curVol && body.dataset.open==='1'){ return; }
    activateVolume(id);
    if(!spreadMQ.matches){ document.getElementById('book').scrollIntoView({behavior:reduce?'auto':'smooth',block:'center'}); }
  }
  // flip to the previous/next volume on the same shelf, keeping the book open
  function siblingVol(delta){
    var V=curV(); var sv=shelfVols(V.shelf); var i=sv.indexOf(V)+delta;
    if(i<0||i>=sv.length) return;
    activateVolume(sv[i].id, true, body.dataset.open==='1');
  }

  document.addEventListener('click', function(e){
    var sp=e.target.closest('.spine'); if(sp){ switchTo(sp.dataset.vol); return; }
    var nv=e.target.closest('#tbNav button'); if(nv){ activateVolume(nv.dataset.vol, true, true); return; }
    var cat=e.target.closest('[data-cat]'); if(cat){ activeCat[curVol]=cat.dataset.cat; render(); return; }
    if(e.target.closest('[data-close-foot]')){ closeBook(); return; }
    if(e.target.closest('[data-close]')){ closeBook(); return; }
    if(e.target.closest('[data-prev]')){ siblingVol(-1); return; }
    if(e.target.closest('[data-next]')){ siblingVol(1); return; }
    var kb=e.target.closest('.keybtn');
    if(kb){ e.stopPropagation(); if(body.dataset.open!=='1'){ openWith(); } return; }
  });
  document.addEventListener('keydown', function(e){
    var kb=e.target.closest&&e.target.closest('.keybtn');
    if(kb&&(e.key==='Enter'||e.key===' ')&&body.dataset.open!=='1'){ e.preventDefault(); openWith(); return; }
    if(body.dataset.open!=='1') return;
    if(e.target.matches('input,textarea')) return;
    if(e.key==='ArrowRight'){ e.preventDefault(); siblingVol(1); }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); siblingVol(-1); }
    else if(e.key==='Escape'){ closeBook(); }
  });
  window.addEventListener('hashchange', function(){ var h=location.hash.replace('#',''); if(byId(h)&&h!==curVol){ activateVolume(h); } });

  buildShelves();
  var init=location.hash.replace('#','');
  var startVol=byId(init)?init:'brinker';
  activateVolume(startVol, !!byId(init));
})();
</script>
</body>
