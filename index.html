<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alastair Zeved Designs &mdash; a portfolio</title>

<!-- SEO -->
<meta name="description" content="A portfolio of completed projects, how-to guides, and skill sheets across horticulture, technology, music, and woodworking.">
<meta name="author" content="Alastair Zeved">

<!-- Open Graph / social sharing — update og:url and og:image once your domain is live -->
<meta property="og:type" content="website">
<meta property="og:title" content="Alastair Zeved Designs">
<meta property="og:description" content="A portfolio of completed projects, how-to guides, and skill sheets across horticulture, technology, music, and woodworking.">
<meta property="og:site_name" content="Alastair Zeved Designs">
<meta property="og:url" content="https://alastairzeved.com">
<meta property="og:image" content="https://alastairzeved.com/og-image.png">

<!-- Canonical URL -->
<link rel="canonical" href="https://alastairzeved.com">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap">
<style>
:root{
  --bg:#0b0912; --line:#ffffff14; --line-2:#ffffff22;
  --bone-0:#f3eddf; --bone-1:#d2cad9; --bone-2:#938aa3;
  --paper:#f3ecdd; --paper-2:#e9e0cd; --ink:#211b16; --ink-2:#5b5247; --ink-3:#8a7f6c;
  --pink:#ff2d78; --violet:#b25cff;
  --grad:linear-gradient(100deg,#ffb43d,#ff5a3d 26%,#ff2d78 50%,#b25cff 74%,#43b6ff);
  --grad-ink:linear-gradient(100deg,#d9641a,#d62f5a 30%,#b3266e 52%,#7b3fd6 76%,#236fc9);
  --serif:'Fraunces',Georgia,serif; --sans:'Switzer','Helvetica Neue',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);-webkit-text-size-adjust:100%}
body{background:radial-gradient(120% 80% at 50% 0%, #1c1330 0%, var(--bg) 55%);color:var(--bone-1);
  font-family:var(--sans);line-height:1.45;font-feature-settings:"kern" 1;text-rendering:optimizeLegibility;
  -webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
.gradtext{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.gradtext-cool{background:linear-gradient(100deg,#5ef2e8,#3b82f6 55%,#7c5cff);-webkit-background-clip:text;background-clip:text;color:transparent}
.stagegl{position:fixed;inset:0;width:100%;height:100%;opacity:.45;pointer-events:none;z-index:0}
.stagegl svg{width:100%;height:100%}

/* top bar (only when open) */
.topbar{position:sticky;top:0;z-index:30;display:none;align-items:center;gap:10px;flex-wrap:nowrap;
  padding:10px clamp(12px,4vw,36px);background:#0b0912d9;backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
body[data-open="1"] .topbar{display:flex}
.tb-brand{display:flex;align-items:center;gap:9px;flex:none}
.tb-brand svg{width:30px;height:30px;display:block}
.tb-brand span{font-family:var(--serif);font-weight:500;font-size:1.05rem}
.tb-nav{display:flex;gap:2px;flex:1 1 auto;min-width:0;overflow-x:auto;flex-wrap:nowrap;scrollbar-width:none;-ms-overflow-style:none}
.tb-nav::-webkit-scrollbar{display:none}
.tb-nav>button{flex:none}
.tb-nav button{appearance:none;background:none;border:none;cursor:pointer;font-family:var(--sans);font-weight:500;
  font-size:.86rem;color:var(--bone-2);padding:9px 11px;min-height:40px;border-radius:6px;position:relative;transition:color .16s,background .16s}
.tb-nav button:hover{color:var(--bone-0);background:#ffffff0a}
.tb-nav button[aria-current="true"]{color:var(--bone-0)}
.tb-nav button[aria-current="true"]::after{content:"";position:absolute;left:11px;right:11px;bottom:3px;height:2px;border-radius:2px;background:var(--grad)}
.tb-close{appearance:none;background:none;border:1px solid var(--line-2);color:var(--bone-1);cursor:pointer;
  font-family:var(--mono);font-size:.72rem;letter-spacing:.06em;padding:8px 12px;border-radius:6px;min-height:40px;flex:none}
.tb-close:hover{color:var(--bone-0);border-color:var(--violet)}

/* stage */
.stage{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:clamp(20px,4vw,48px) 16px 60px;gap:18px}

/* book */
.book-wrap{perspective:2400px}
.book{position:relative;--pw:min(94vw,540px);width:var(--pw);height:min(760px,calc(100vh - 140px));height:min(760px,calc(100dvh - 140px));transform-style:preserve-3d;
  transition:width 1.05s cubic-bezier(.2,.02,.12,1)}
.back-cover{position:absolute;inset:0;border-radius:7px 12px 12px 7px;background:#0d0a14;
  box-shadow:0 40px 90px -30px #000,0 0 0 1px #ffffff10;transform:translateZ(-10px)}
/* the reading pages */
.page{position:absolute;top:0;bottom:0;width:var(--pw);overflow:hidden;background:var(--paper);
  display:flex;flex-direction:column}
.page-r{right:0;z-index:2;border-radius:6px 11px 11px 6px;
  background:linear-gradient(90deg,#d9d0bd 0 16px,var(--paper) 26px), var(--paper);
  box-shadow:inset 22px 0 36px -28px #00000055, inset -6px 0 14px -10px #00000022}
.page-l{left:0;z-index:1;border-radius:11px 6px 6px 11px;
  background:linear-gradient(270deg,#d9d0bd 0 16px,var(--paper) 26px), var(--paper);
  box-shadow:inset -22px 0 36px -28px #00000055, inset 6px 0 14px -10px #00000022}
/* two-page spread on wider screens once open */
@media(min-width:820px){
  .book{--pw:min(46vw,468px)}
  body[data-open="1"] .book{width:calc(2*var(--pw))}
}
@media(max-width:819px){ .page-l{display:none} }
.page-inner{flex:1;overflow-y:auto;padding:clamp(26px,5%,46px) clamp(22px,7%,52px) 10px clamp(34px,9%,64px);color:var(--ink)}
.page-l .page-inner{padding:clamp(26px,5%,46px) clamp(34px,9%,64px) 10px clamp(22px,7%,52px)}
.page-inner::-webkit-scrollbar{width:9px}.page-inner::-webkit-scrollbar-thumb{background:#0000001f;border-radius:8px;border:3px solid transparent;background-clip:padding-box}
.page-foot{flex:none;display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:10px clamp(22px,7%,52px) 14px clamp(34px,9%,64px);border-top:1px solid #00000016;background:#00000006}
.pf-btn,.pf-turn button{appearance:none;background:none;border:1px solid #0000001f;color:var(--ink-2);cursor:pointer;
  font-family:var(--mono);font-size:.7rem;letter-spacing:.05em;padding:8px 12px;border-radius:6px;min-height:40px}
.pf-btn:hover,.pf-turn button:hover{color:var(--ink);border-color:var(--pink)}
.pf-turn{display:flex;align-items:center;gap:10px}
.folio{font-family:var(--mono);font-size:.72rem;color:var(--ink-3);min-width:3.5em;text-align:center}
button[disabled]{opacity:.35;cursor:default}

/* page content */
.ch-eyebrow{font-family:var(--mono);font-weight:500;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:#a06a2e}
.ch-title{font-family:var(--serif);font-weight:600;font-size:clamp(1.9rem,6vw,2.9rem);line-height:1.02;letter-spacing:-.015em;margin:.35rem 0 0;
  background:var(--grad-ink);-webkit-background-clip:text;background-clip:text;color:transparent}
.ch-desc{font-family:var(--serif);font-style:italic;font-size:clamp(1.05rem,2.6vw,1.28rem);color:var(--ink-2);margin-top:.6rem;max-width:46ch}
.ch-body{margin-top:1.5rem;max-width:60ch;color:#3a322a;font-size:1.0rem}
.ch-body p+p{margin-top:.8rem}
.tag{display:inline-flex;align-items:center;gap:.5em;font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-2);padding:5px 11px;border-radius:999px;border:1px solid #0000002a;background:#00000008;margin-top:1rem}
.tag::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--grad)}
.scaffold{margin-top:1.6rem;display:grid;gap:11px;max-width:60ch}
.sk{height:13px;border-radius:7px;background:#00000010}
.sk.w90{width:90%}.sk.w80{width:80%}.sk.w70{width:70%}.sk.w50{width:50%}
.sk-block{height:110px;border-radius:9px;border:1px dashed #0000002e;background:#00000005;display:flex;align-items:center;justify-content:center;
  color:var(--ink-3);font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase}
/* domain cards */
.dgrid{margin-top:1.6rem;display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:520px){.dgrid{grid-template-columns:1fr 1fr}}
.page .dgrid{grid-template-columns:1fr}
.dcard{border:1px solid #0000001f;border-radius:11px;padding:16px 15px;background:#00000006;display:flex;flex-direction:column;gap:8px}
.dc-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.dcard h3{font-family:var(--sans);font-weight:600;font-size:1.05rem;color:var(--ink)}
.dc-dom{font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);flex:none}
.dc-desc{color:#3a322a;font-size:.9rem;flex:1}.dcard .tag{align-self:flex-start;margin-top:.2rem}
/* chapter tabs */
.ch-tabs{display:flex;gap:2px;margin-top:1.4rem;border-bottom:1px solid #00000014;padding-bottom:0}
.ch-tab{appearance:none;background:none;border:none;cursor:pointer;font-family:var(--mono);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-3);padding:9px 13px 11px;border-radius:6px 6px 0 0;position:relative;transition:color .15s,background .15s}
.ch-tab:hover{color:var(--ink);background:#00000008}
.ch-tab[aria-selected="true"]{color:var(--ink)}
.ch-tab[aria-selected="true"]::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;border-radius:2px 2px 0 0;background:var(--grad-ink)}
.ch-panel{margin-top:1.2rem}
/* steps (The Approach) */
.steps{list-style:none;margin-top:1.5rem;display:flex;flex-direction:column}
.step{display:flex;gap:16px;align-items:flex-start;padding:16px 4px;border-bottom:1px solid #00000014}
.step:last-child{border-bottom:none}
.step .num{font-family:var(--serif);font-weight:600;font-size:1.7rem;line-height:1;background:var(--grad-ink);-webkit-background-clip:text;background-clip:text;color:transparent;flex:none;min-width:1.7em}
.step .stxt{flex:1}
.step .st-t{font-family:var(--serif);font-weight:500;font-size:1.2rem;color:var(--ink);display:flex;align-items:baseline;gap:.6em}
.step .st-tag{font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
/* contents page */
.toc-head{display:flex;align-items:center;gap:14px;border-bottom:1px solid #0000001a;padding-bottom:16px;margin-bottom:8px}
.toc-head svg{width:46px;height:46px;flex:none}
.toc-head .th-t{font-family:var(--serif);font-weight:600;font-size:1.5rem;color:var(--ink);line-height:1}
.toc-head .th-s{font-family:var(--mono);font-size:.62rem;letter-spacing:.34em;text-transform:uppercase;color:var(--ink-3);margin-top:5px}
.toc-epi{font-family:var(--serif);font-style:italic;color:var(--ink-2);font-size:1.02rem;margin:14px 0 22px;max-width:44ch}
.toc-h{font-family:var(--mono);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px}
.toc-list{list-style:none;display:flex;flex-direction:column}
.toc-item{width:100%;appearance:none;background:none;border:none;cursor:pointer;display:flex;align-items:baseline;gap:10px;
  padding:14px 4px;border-bottom:1px solid #00000014;text-align:left;min-height:48px}
.toc-item:hover .tt{color:#000}.toc-item:hover .ch{color:var(--pink)}
.toc-item .ch{font-family:var(--mono);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);flex:none;transition:color .16s}
.toc-item .tt{font-family:var(--serif);font-weight:500;font-size:1.3rem;color:var(--ink);transition:color .16s}
.toc-item .dots{flex:1;border-bottom:1px dotted #00000040;transform:translateY(-4px)}
.toc-item .pg{font-family:var(--mono);font-size:.8rem;color:var(--ink-3);flex:none}

/* the cover (front) */
.cover{position:absolute;right:0;top:0;bottom:0;width:var(--pw);transform-origin:left center;transform-style:preserve-3d;z-index:5;cursor:pointer;
  transition:transform 1.05s cubic-bezier(.2,.02,.12,1)}
body[data-open="1"] .cover{transform:rotateY(-162deg);opacity:0;pointer-events:none;
  transition:transform 1.05s cubic-bezier(.2,.02,.12,1),opacity .12s 1s}
.cover .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:6px 11px 11px 6px;overflow:hidden}
.cover .front{background:
  radial-gradient(70% 50% at 50% 30%, #2a1d3f 0%, #140d22 60%, #0d0917 100%);
  box-shadow:inset 0 0 0 1px #ffffff14, 0 40px 90px -30px #000}
.cover .back{transform:rotateY(180deg);background:linear-gradient(120deg,#15101f,#0d0a14);
  box-shadow:inset 0 0 0 1px #ffffff10}
.cover-gl{position:absolute;inset:0;opacity:.5;pointer-events:none}.cover-gl svg{width:100%;height:100%}
.cover-frame{position:absolute;inset:16px;border-radius:5px;border:1px solid #ffffff1f;
  box-shadow:inset 0 0 0 1px #00000040}
.cover-frame::before{content:"";position:absolute;inset:5px;border-radius:3px;border:1px solid #ffffff10}
.cover-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:clamp(40px,9%,70px) 24px;text-align:center;z-index:2}
.cv-top{font-family:var(--mono);font-size:.66rem;letter-spacing:.4em;text-transform:uppercase;color:var(--bone-2);text-indent:.4em}
.cv-mid{display:flex;flex-direction:column;align-items:center;gap:10px}
.cv-name{font-family:var(--serif);font-weight:600;font-size:clamp(2.1rem,8vw,3.1rem);line-height:.98;letter-spacing:-.02em}
.cv-sub{font-family:var(--mono);font-size:.66rem;letter-spacing:.5em;text-transform:uppercase;color:var(--bone-2);text-indent:.5em}
/* lock + key */
.lock{display:flex;flex-direction:column;align-items:center;gap:12px}
.keybtn{appearance:none;background:none;border:none;cursor:pointer;width:clamp(96px,26%,128px);aspect-ratio:1;border-radius:50%;
  display:flex;align-items:center;justify-content:center;position:relative;transition:transform .5s cubic-bezier(.3,.1,.2,1);
  box-shadow:0 0 0 1px #ffffff1f, inset 0 0 30px #00000060}
.keybtn::before{content:"";position:absolute;inset:-6px;border-radius:50%;background:conic-gradient(from 0deg,#ffd23d,#ff2d78,#7c5cff,#22d3ee,#ffd23d);
  opacity:.5;filter:blur(7px);z-index:-1;transition:opacity .3s}
.keybtn:hover::before{opacity:.85}
.keybtn svg{width:84%;height:84%;display:block}
body[data-open="1"] .keybtn{transform:rotate(90deg)}
.keybtn:focus-visible{outline:2px solid var(--violet);outline-offset:4px}
.cv-hint{font-family:var(--mono);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--bone-1);display:flex;align-items:center;gap:.6em}
.cv-hint .pulse{width:7px;height:7px;border-radius:50%;background:var(--grad);animation:pulse 2.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
body[data-open="1"] .cv-hint{opacity:0}

/* page-turn leaf */
.leaf{position:absolute;right:0;top:0;bottom:0;width:var(--pw);transform-origin:left center;z-index:8;border-radius:6px 11px 11px 6px;
  background:linear-gradient(105deg,#efe7d6,#f4ecdd 60%,#e6dcc8);box-shadow:0 18px 40px -16px #00000066, inset 22px 0 30px -26px #00000055;
  backface-visibility:hidden;opacity:0;pointer-events:none}
.leaf.turn{animation:turn .72s cubic-bezier(.4,.05,.25,1) both}
@keyframes turn{0%{opacity:1;transform:rotateY(0)}100%{opacity:1;transform:rotateY(-176deg)}}

.foot{position:relative;z-index:1;text-align:center;padding:18px 16px 30px;font-family:var(--mono);font-size:.7rem;color:var(--bone-2)}
body[data-open="1"] .foot{display:none}

:focus-visible{outline:2px solid var(--violet);outline-offset:3px;border-radius:3px}
@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
  .leaf.turn{display:none}
}
@media(max-width:680px){
  .tb-brand span{display:none}
  .topbar{flex-wrap:wrap;gap:8px;padding-bottom:6px}
  .tb-brand{order:1}
  .tb-close{order:2;margin-left:auto;padding:8px 10px;font-size:.66rem}
  .tb-nav{order:3;flex:1 1 100%;width:100%;justify-content:flex-start;gap:2px}
  .tb-nav button{padding:9px 11px;font-size:.84rem}
}
@media(max-width:480px){
  .stage{padding:14px 10px 18px}
  .foot{padding:12px 12px 18px}
  .page-inner{padding:20px 18px 8px 26px}
  .page-foot{padding:8px 18px 12px 26px}
  .pf-btn,.pf-turn button{padding:8px 9px;font-size:.64rem}
  .pf-turn{gap:7px}.folio{min-width:2.3em}
  .cover-inner{padding:clamp(24px,6%,70px) 18px}
  .cv-name{font-size:clamp(1.7rem,8.5vw,3.1rem)}
  .ad-cover{max-width:160px}
}
@media(max-width:360px){
  .page-foot{flex-wrap:wrap;justify-content:center;gap:8px;padding:8px 14px 10px 20px}
  .page-inner{padding:16px 14px 6px 20px}
  .cv-top{font-size:.58rem;letter-spacing:.3em}
}

/* ===== two-volume shelf ===== */
.shelf{display:flex;gap:clamp(18px,4vw,48px);align-items:center;justify-content:center;flex-wrap:wrap}
.book{--pw:min(94vw,400px)}
@media(min-width:820px){
  .book{--pw:min(42vw,362px)}
  body[data-open="1"] .book[data-active]{width:calc(2*var(--pw))}
}
@media(max-width:819px){ .shelf{flex-direction:column} }
/* once a volume is open, hide the shelf-mate and the closed instructions */
body[data-open="1"] .book:not([data-active]){display:none}
.vol-tag{position:absolute;top:-26px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:.62rem;
  letter-spacing:.22em;text-transform:uppercase;color:var(--bone-2)}
body[data-open="1"] .vol-tag{opacity:0}
/* Vol. II cover uses the compact emblem instead of the key */
.emblem-lg{width:clamp(84px,24%,116px);aspect-ratio:1;display:flex;align-items:center;justify-content:center}
.emblem-lg svg{width:100%;height:100%}
.cover .front.rg{background:radial-gradient(70% 50% at 50% 30%, #14233a 0%, #0e1626 60%, #0b111d 100%)}

/* ===== chapter editorial layout ===== */
.hero-ph{margin-top:1.5rem;min-height:210px}
.ph{border:1px dashed #00000030;border-radius:10px;background:#0000000a;display:flex;align-items:center;justify-content:center;
  text-align:center;color:var(--ink-3);font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;
  padding:16px;min-height:150px}
/* category sub-navigation */
.catnav{display:flex;flex-wrap:wrap;gap:7px;padding-bottom:14px;border-bottom:1px solid #00000016;margin-bottom:2px}
.catnav button{appearance:none;background:#00000008;border:1px solid #0000001f;border-radius:999px;cursor:pointer;
  font-family:var(--mono);font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);
  padding:7px 12px;min-height:34px;transition:color .15s,background .15s,border-color .15s}
.catnav button:hover{color:var(--ink);border-color:var(--pink)}
.catnav button[aria-selected="true"]{color:#fff;background:var(--grad-ink);border-color:transparent}
/* a prose section */
.sec{margin-top:1.4rem}
.sec-k{font-family:var(--mono);font-weight:500;font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:#a06a2e}
.sec h3{font-family:var(--serif);font-weight:600;font-size:clamp(1.4rem,3.4vw,1.7rem);line-height:1.04;color:var(--ink);margin:.3rem 0 .1rem}
.sec p{color:#3a322a;font-size:1rem;max-width:62ch;margin-top:.7rem}
.sec .ph{margin-top:1.1rem}
/* front-matter table of contents (left) reuses .toc-* ; about (right) reuses .ch-body/.steps */
.fm-portrait{margin-top:0}
</style>

        body:[

          "A B.S. in Accounting gave me the vocabulary; years on a regulated trading desk gave me the instinct for where risk actually hides. Somewhere along the way I stopped treating &ldquo;the numbers&rdquo; and &ldquo;the workflow that produces them&rdquo; as two different jobs.",

            {id:'execution',label:'Trade Execution',h:'Trade Execution & Risk Control',img:'Trade desk',body:["Executes daily equity trades across multi-sleeve portfolios under tight service-level windows — rebalancing, liquidity events, model delivery, tax-sensitive transitions, and custom blends for high-net-worth accounts.","Leads block-order execution for proprietary fund holdings via auction, and serves as the desk's escalation point for reconciliation breaks, drift exceptions, and liquidity constraints — partnering across Compliance, Operations, and Technology."]},
            {id:'scaling',label:'Scaling & Training',h:'Scaling & Cross-Training',img:'Cross-training',body:["Originated and solo-traded a new product queue at launch, then designed and ran the cross-training program that grew the desk from a single trader into a full team handling multi-sleeve execution.","Extended coverage to the firm's highest-complexity accounts by onboarding and training additional traders into that book."]},
            {id:'analytics',label:'Analytics & Oversight',h:'Operational Analytics & AI-Agent Oversight',img:'Analytics build',body:["Built the analytical model behind the desk's KPI dashboard independently — segmenting request types, tracking queue-time service levels, and modeling trade flow and staffing capacity for leadership decisions.","Now extending that dashboard into a monitoring layer for AI-agent-driven workflow automation — watching for bottlenecks and exceptions as the firm scales agentic tooling on the trading desk."]}

          cats:[
            {id:'trust',label:'Trust Administration',h:'Portfolio & Trust Administrator, Irrevocable Trust Specialty Group',img:'Trust administration',body:["Administered trust portfolios through tax-loss harvesting, liquidity management, and regulatory compliance workflows, and presented compliance exceptions to the Investment Committee.","Produced ad hoc performance reporting and asset-allocation analysis to support portfolio reviews."]},
            {id:'branch',label:'Branch Banking',h:'Financial Services Associate, Branch Banking',img:'Branch banking',body:["Supported advisors across personal banking, lending, and account maintenance at a high-volume retail branch, partnering with Mortgage, Investments, Business Banking, and Wealth Management on integrated client financial plans."]}
          ]},
        {id:'eddiebauer',title:'Eddie Bauer',desc:'Assistant Manager — visual merchandising, team leadership, and multi-store expansion at one of the country’s highest-volume locations.',hero:'Eddie Bauer · King of Prussia',
          cats:[
            {id:'visual',label:'Visual Merchandising',h:'Visual Merchandising',img:'Floor move · King of Prussia',body:["Ran visual merchandising at the King of Prussia store — one of the highest-volume locations in the country — translating corporate directives onto the floor every month and working with payroll to execute each reset on time and to a standard high enough to make the store a proving ground for others."]},
            {id:'team',label:'Team Leadership',h:'Team Leadership & Training',img:'Visual team',body:["Hired and trained a visual team from the ground up, building the bench needed to hit a demanding monthly reset cycle without letting the standard slip."]},
            {id:'expansion',label:'Store Openings',h:'Store Openings & Expansion',img:'Montgomeryville build-out',body:["Helped open two additional stores, then relocated to Montgomeryville to close the outgoing location and help open its replacement — carrying the same visual standard into a new build from day one."]},
            {id:'sales',label:'Sales Performance',h:'Sales Performance',img:'Sales recognition',body:["Closed out one year as the top salesperson in the Northeast region, on the way to promotion into assistant manager."]}
          ]},
        {id:'education',title:'Education & Licensing',desc:'The credentials underneath the work.',hero:'Diploma · Series 65',
          cats:[
            {id:'creds',label:'Credentials',h:'Education & Licensing',img:'Maryville University · Series 65',body:["A Bachelor of Science in Accounting, magna cum laude, from Maryville University — the foundation for a career that turned out to be less about the numbers themselves and more about the systems that produce them.","Series 65 licensed, with a working knowledge of Python built through continued self-study."]}
          ]},
        {id:'volunteering',title:'Volunteering & Community Engagement',desc:"Civic work in urban greening — the community-impact side of the same instinct that shows up in Vol. I.",hero:'Street trees · South Philadelphia',
          cats:[
            {id:'treetenders',label:'PHS Tree Tenders',h:'PHS Tree Tenders',img:'Street tree planting',body:["Volunteers with PHS Tree Tenders, planting and establishing street trees as part of the citywide effort to grow Philadelphia's urban canopy. It's civic work with a documented return: a growing body of urban research ties expanded tree cover to measurably safer, more stable blocks, alongside the more familiar gains in air quality, cooler streets, and stormwater management."]},
            {id:'flowershow',label:'PHS Flower Show',h:'PHS Flower Show',img:'PHS Flower Show',body:["Volunteers each year at the PHS Flower Show, the Society's flagship public event and one of the largest horticultural exhibitions in the country — direct, hands-on support for the organization behind the city's tree-planting and greening work."]},
            {id:'composting',label:'Composting Committee',h:'Growing Together Community Garden — Composting Committee',img:'Composting systems',body:["Serves on the Composting Committee at Growing Together Community Garden, helping run the systems — collection, education, signage — that keep a shared South Philadelphia composting program functioning at neighborhood scale rather than as one-off volunteering."]}
          ]}
      ]
    }
  };

  var curVol=null, curIdx=0, activeCat={};
  function book(v){ return document.querySelector('.book[data-vol="'+v+'"]'); }
  function keys(v){ return ['front'].concat(DATA[v].chapters.map(function(c){return c.id;})); }

  function tocHTML(v){
    var d=DATA[v];
    var items=d.chapters.map(function(c,i){
      return '<li><button class="toc-item" data-goidx="'+(i+1)+'"><span class="ch">Ch. '+ROM[i+1]+'</span><span class="tt">'+c.title+'</span><span class="dots"></span><span class="pg">'+(i+1)+'</span></button></li>';
    }).join('');
    return '<div class="toc-head">'+TOC_EMBLEM+'<div><div class="th-t">'+d.toc.title+'</div><div class="th-s">'+d.toc.sub+'</div></div></div>'+
      '<p class="toc-epi">'+d.toc.epi+'</p><p class="toc-h">Contents</p><ol class="toc-list">'+items+'</ol>';
  }
  function aboutHTML(v){
    var a=DATA[v].about;
    var b=a.body.map(function(p){return '<p>'+p+'</p>';}).join('');
    var m=a.method?('<p class="ch-eyebrow" style="margin-top:1.6rem">The Method</p><ol class="steps">'+a.method.map(function(s,i){return '<li class="step"><span class="num">'+pad(i+1)+'</span><span class="stxt"><span class="st-t">'+s+'</span></span></li>';}).join('')+'</ol>'):'';
    return '<p class="ch-eyebrow">'+a.eyebrow+'</p><h2 class="ch-title">'+a.title+'</h2><p class="ch-desc">'+a.desc+'</p><div class="ch-body">'+b+'</div>'+
      '<div class="scaffold fm-portrait" style="margin-top:1.2rem"><div class="sk-block">Portrait &mdash; to come</div></div>'+m;
  }
  function openerHTML(v,ci){
    var c=DATA[v].chapters[ci];
    var hero=c.hero?'<div class="ph hero-ph">'+c.hero+'</div>':'';
    return '<p class="ch-eyebrow">Chapter '+ROM[ci+1]+' &middot; '+c.title+'</p><h2 class="ch-title">'+c.title+'</h2><p class="ch-desc">'+c.desc+'</p>'+hero;
  }
  function sectionHTML(c,catId){
    var k=c.cats[0]; c.cats.forEach(function(x){if(x.id===catId)k=x;});
    var ps=k.body.map(function(p){return '<p>'+p+'</p>';}).join('');
    var img=k.img?'<div class="ph">'+k.img+'</div>':'';
    return '<div class="sec"><p class="sec-k">'+c.title+'</p><h3>'+k.h+'</h3>'+ps+img+'</div>';
  }
  function rightChapterHTML(v,ci){
    var c=DATA[v].chapters[ci];
    var cat=activeCat[v+':'+c.id]||c.cats[0].id;
    var nav='<div class="catnav">'+c.cats.map(function(k){return '<button data-cat="'+k.id+'" aria-selected="'+(k.id===cat?'true':'false')+'">'+k.label+'</button>';}).join('')+'</div>';
    return nav+sectionHTML(c,cat);
  }

  function render(){
    var bk=book(curVol); if(!bk) return;
    var L=bk.querySelector('.page-l .page-inner'), R=bk.querySelector('.page-r .page-inner');
    var ks=keys(curVol), key=ks[curIdx], lh, rh;
    if(key==='front'){ lh=aboutHTML(curVol); rh=tocHTML(curVol); }
    else { var ci=curIdx-1; lh=openerHTML(curVol,ci); rh=rightChapterHTML(curVol,ci); }
    if(spreadMQ.matches){ L.innerHTML=lh; R.innerHTML=rh; }
    else { L.innerHTML=''; R.innerHTML=lh+rh; }
    L.scrollTop=0; R.scrollTop=0;
    bk.querySelector('.folio').textContent=(key==='front'?'—':String(curIdx));
    bk.querySelector('[data-prev]').disabled=curIdx<=0;
    bk.querySelector('[data-next]').disabled=curIdx>=ks.length-1;
    bk.querySelector('.pf-btn').style.visibility=(key==='front'?'hidden':'visible');
    var nav=document.getElementById('tbNav');
    Array.prototype.forEach.call(nav.children,function(b){ b.setAttribute('aria-current', b.dataset.goidx===String(curIdx)?'true':'false'); });
  }
  (spreadMQ.addEventListener?spreadMQ.addEventListener.bind(spreadMQ,'change'):spreadMQ.addListener.bind(spreadMQ))(render);

  function buildNav(v){
    var nav=document.getElementById('tbNav'); nav.innerHTML='';
    var mk=function(idx,label){ var b=document.createElement('button'); b.dataset.goidx=String(idx); b.textContent=label; nav.appendChild(b); };
    mk(0,'Contents'); DATA[v].chapters.forEach(function(c,i){ mk(i+1,c.title); });
    document.getElementById('tbBrand').textContent=DATA[v].brand;
  }
  function goIdx(idx,animate){
    var ks=keys(curVol); if(idx<0||idx>=ks.length) return;
    if(idx===curIdx){ render(); return; }
    curIdx=idx;
    if(animate&&!reduce){ var lf=book(curVol).querySelector('.leaf'); lf.classList.remove('turn'); void lf.offsetWidth; lf.classList.add('turn'); setTimeout(render,120); }
    else render();
  }
  function openVolume(v){
    curVol=v; curIdx=0;
    document.querySelectorAll('.book').forEach(function(b){ b.removeAttribute('data-active'); });
    book(v).setAttribute('data-active','');
    buildNav(v); body.dataset.open='1'; render();
    setTimeout(function(){ var n=document.getElementById('tbNav'); if(n.firstChild) n.firstChild.focus(); }, reduce?0:1000);
  }
  function openWith(v){ if(!reduce){ setTimeout(function(){openVolume(v);},360); } else openVolume(v); }
  function close(){ body.dataset.open='0'; document.querySelectorAll('.book').forEach(function(b){b.removeAttribute('data-active');}); curVol=null; history.replaceState(null,'','#'); }

  document.addEventListener('click', function(e){
    var cat=e.target.closest('[data-cat]');
    if(cat){ var ci=curIdx-1; if(ci>=0){ activeCat[curVol+':'+DATA[curVol].chapters[ci].id]=cat.dataset.cat; render(); } return; }
    var gi=e.target.closest('[data-goidx]'); if(gi){ e.preventDefault(); goIdx(parseInt(gi.dataset.goidx,10),true); return; }
    if(e.target.closest('[data-go="front"]')){ goIdx(0,true); return; }
    if(e.target.closest('[data-close]')){ close(); return; }
    if(e.target.closest('[data-prev]')){ goIdx(curIdx-1,true); return; }
    if(e.target.closest('[data-next]')){ goIdx(curIdx+1,true); return; }
    var kb=e.target.closest('.keybtn');
    if(kb){ e.stopPropagation(); if(body.dataset.open!=='1'){ openWith(kb.closest('.book').dataset.vol); } return; }
    var cov=e.target.closest('.cover');
    if(cov&&body.dataset.open!=='1'){ openWith(cov.closest('.book').dataset.vol); return; }
  });
  document.addEventListener('keydown', function(e){
    var kb=e.target.closest&&e.target.closest('.keybtn');
    if(kb&&(e.key==='Enter'||e.key===' ')&&body.dataset.open!=='1'){ e.preventDefault(); openWith(kb.closest('.book').dataset.vol); return; }
    if(body.dataset.open!=='1') return;
    if(e.target.matches('input,textarea')) return;
    if(e.key==='ArrowRight'){ e.preventDefault(); goIdx(curIdx+1,true); }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); goIdx(curIdx-1,true); }
    else if(e.key==='Escape'){ close(); }
  });

  window.addEventListener('hashchange', function(){ var h=location.hash.replace('#',''); if(DATA[h]&&body.dataset.open!=='1'){ openVolume(h); } });
  var init=location.hash.replace('#','');
  if(DATA[init]){ openVolume(init); }
})();
</script>
</body>
