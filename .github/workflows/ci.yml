name: CI

# Quality gate for the redesign: type/template checks, a clean production build,
# and the Playwright no-scroll + functional regression suite. Runs on every PR
# and on pushes to main.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type / template check (svelte-check)
        run: npm run check

      - name: Production build
        run: npm run build

      # CI has no pre-installed browser (unlike the dev sandbox), so fetch the
      # Chromium that matches the pinned @playwright/test version.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright tests
        run: npm test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
